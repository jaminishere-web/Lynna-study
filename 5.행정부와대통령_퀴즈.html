<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정부와 대통령 — 암기 퀴즈 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --border: #dde3ec;
    --primary: #1a3a6b;
    --primary-light: #3468b0;
    --accent: #c0392b;
    --text: #1a1a1a;
    --text-muted: #888;
    --answer-bg: #e8eef8;
    --answer-text: #0d2a56;
    --tag1: #e3eaf8; --tag1-text: #1a3a6b;
    --tag2: #fdf0e0; --tag2-text: #8b4c00;
    --tag3: #e8f5e9; --tag3-text: #1b5e20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }

  header {
    background: var(--primary); color: #fff;
    padding: 26px 20px 18px; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 900; }
  header p { font-size: 0.77rem; opacity: 0.82; margin-top: 4px; }

  .stats-bar {
    background: var(--primary-light); color: #fff;
    display: flex; justify-content: center; gap: 28px;
    padding: 7px 20px; font-size: 0.82rem; font-weight: 700;
  }

  .tab-bar {
    display: flex; overflow-x: auto;
    background: #fff; border-bottom: 2px solid var(--border);
    position: sticky; top: 71px; z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 10px 15px;
    font-size: 0.79rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: none; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .controls { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
  .btn {
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px; transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: right; }

  .cards-grid { display: flex; flex-direction: column; gap: 10px; padding: 4px 14px; }

  .card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .q-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }
  .q-body { flex: 1; }
  .q-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-bottom: 5px;
  }
  .q-text { font-size: 0.9rem; font-weight: 500; line-height: 1.55; }

  .card-answer { display: none; padding: 0 14px 14px 54px; }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg); border-radius: 10px;
    padding: 10px 14px; font-size: 0.88rem; font-weight: 700;
    color: var(--answer-text); line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem; font-weight: 900; letter-spacing: 0.5px;
    color: var(--primary-light); margin-bottom: 4px; display: block;
  }

  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>

<header>
  <h1>🇰🇷 행정부와 대통령</h1>
  <p>Ⅱ. 헌법과 국가 기관 2단원 — 암기 퀴즈 30문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>30</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 행정부·대통령</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 대통령의 권한</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 행정부 조직·확인</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 30 확인</div>
</div>

<div id="cardContainer"></div>
<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

<script>
const questions = [
  // ── ❶ 행정부와 대통령의 지위 (10문제) ──
  { id:1,  tab:'1', tag:'행정의 의미', q:'법에 따라 나라의 살림을 맡아 하는 국가 작용을 무엇이라 하는가?', a:'행정' },
  { id:2,  tab:'1', tag:'행정의 의미', q:'행정을 담당하는 국가 기관을 무엇이라 하는가?', a:'행정부' },
  { id:3,  tab:'1', tag:'행정의 의미', q:'행정부가 하는 일의 예 세 가지는?', a:'국방(군대 관리), 치안(경찰), 소방, 도로·교량 건설, 교육, 외교 등' },
  { id:4,  tab:'1', tag:'대통령의 지위', q:'우리나라 행정부의 최고 책임자는?', a:'대통령' },
  { id:5,  tab:'1', tag:'대통령의 지위', q:'대통령은 어떤 두 가지 지위를 갖는가?', a:'국가 원수, 행정부 수반' },
  { id:6,  tab:'1', tag:'대통령의 지위', q:'국가 원수로서 대통령이 하는 역할은?', a:'국가와 헌법을 수호하고, 국가를 대표하여 외교 활동을 한다' },
  { id:7,  tab:'1', tag:'대통령의 지위', q:'행정부 수반으로서 대통령이 하는 역할은?', a:'행정부를 이끌며 행정을 총괄한다' },
  { id:8,  tab:'1', tag:'대통령 선출', q:'우리나라 대통령의 임기는?', a:'5년' },
  { id:9,  tab:'1', tag:'대통령 선출', q:'대통령은 어떻게 선출되는가?', a:'국민이 직접 선거로 선출한다' },
  { id:10, tab:'1', tag:'대통령 선출', q:'대통령은 연임(같은 사람이 거듭 대통령이 되는 것)이 가능한가?', a:'불가능하다 (단임제, 1회에 한함)' },

  // ── ❷ 대통령의 권한 (13문제) ──
  { id:11, tab:'2', tag:'행정에 관한 권한', q:'대통령이 국무총리, 장관 등 행정부의 주요 공무원을 임명하는 권한은?', a:'임명권' },
  { id:12, tab:'2', tag:'행정에 관한 권한', q:'대통령이 국회에서 만든 법률을 집행하기 위해 세부 규정을 만드는 것은?', a:'대통령령(명령) 제정권' },
  { id:13, tab:'2', tag:'입법에 관한 권한', q:'대통령이 국회에 법률안을 제출할 수 있는 권한은?', a:'법률안 제출권' },
  { id:14, tab:'2', tag:'입법에 관한 권한', q:'국회에서 의결된 법률안에 대해 대통령이 이의를 제기하여 국회에 재심의를 요청할 수 있는 권한은?', a:'법률안 거부권(재의 요구권)' },
  { id:15, tab:'2', tag:'입법에 관한 권한', q:'국회에서 의결된 법률을 공식적으로 알리는 대통령의 권한은?', a:'법률 공포권' },
  { id:16, tab:'2', tag:'사법에 관한 권한', q:'대통령이 대법원장, 헌법재판소장 등을 임명하는 권한은?', a:'사법부 주요 인사 임명권' },
  { id:17, tab:'2', tag:'사법에 관한 권한', q:'대통령이 형사 처벌을 받은 사람의 형을 면제하거나 줄여 주는 권한은?', a:'사면권' },
  { id:18, tab:'2', tag:'국가 원수로서의 권한', q:'국가 안위에 관한 중요한 정책을 국민 투표에 부칠 수 있는 대통령의 권한은?', a:'국민 투표 부의권' },
  { id:19, tab:'2', tag:'국가 원수로서의 권한', q:'국가 비상사태에 대통령이 국가 긴급권(계엄 선포 등)을 행사할 수 있다. 이를 견제하기 위해 국회가 갖는 권한은?', a:'계엄 해제 요구권(국회의 견제)' },
  { id:20, tab:'2', tag:'국가 원수로서의 권한', q:'대통령이 외국과 조약을 체결하고 외교 사절을 파견하는 권한은?', a:'조약 체결·비준권, 외교 사절 신임·접수권' },
  { id:21, tab:'2', tag:'국가 원수로서의 권한', q:'국군을 지휘·감독하는 대통령의 권한은?', a:'국군 통수권' },
  { id:22, tab:'2', tag:'대통령 권한 견제', q:'대통령의 권한 남용을 견제하기 위한 제도 중, 국무회의에서 중요 정책을 심의하도록 하는 이유는?', a:'독단적인 결정을 막기 위해' },
  { id:23, tab:'2', tag:'대통령 권한 견제', q:'대통령의 임기를 5년 단임으로 제한하는 이유는?', a:'권력의 장기 집중을 방지하고 민주주의를 보장하기 위해' },

  // ── ❸ 행정부 조직·스스로 확인 (7문제) ──
  { id:24, tab:'3', tag:'국무총리', q:'대통령을 보좌하며 행정 각부를 통할하고, 대통령이 부재 시 대통령의 직무를 대행하는 사람은?', a:'국무총리' },
  { id:25, tab:'3', tag:'국무회의', q:'대통령, 국무총리, 국무 위원으로 구성되며 정부의 중요한 정책을 심의하는 행정부의 최고 심의 기관은?', a:'국무회의' },
  { id:26, tab:'3', tag:'국무회의', q:'국무회의 의장은 누구인가?', a:'대통령' },
  { id:27, tab:'3', tag:'행정 각부', q:'행정 각부란 무엇이며, 각부의 장을 무엇이라 하는가?', a:'국방부·외교부 등 각 분야 행정을 담당하는 부서. 각부의 장은 장관' },
  { id:28, tab:'3', tag:'스스로 확인', q:'대통령은 국가 원수이자 ( ) 수반이다.', a:'행정부' },
  { id:29, tab:'3', tag:'스스로 확인', q:'대통령이 국회에서 의결한 법률안의 재심의를 요구할 수 있는 권한을 무엇이라 하는가?', a:'법률안 거부권(재의 요구권)' },
  { id:30, tab:'3', tag:'스스로 확인', q:'다음 중 대통령의 권한을 ①행정 ②입법 ③사법 ④국가 원수로 구분하시오: 법률안 거부권 / 국군 통수권 / 사면권 / 대통령령 제정권', a:'법률안 거부권→②입법 / 국군 통수권→④국가 원수 / 사면권→③사법 / 대통령령 제정권→①행정' },
];

const TOTAL = 30;
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return { '1':'t1', '2':'t2', '3':'t3' }[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  revealedSet.has(id) ? revealedSet.delete(id) : revealedSet.add(id);
  updateStats(); renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  document.getElementById('progressFill').style.width = Math.round(count/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent = `${count} / ${TOTAL} 확인`;
}

function showTab(tab) {
  currentTab = tab;
  const tabs = ['all','1','2','3'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats(); renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats(); renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
</body>
</html>
