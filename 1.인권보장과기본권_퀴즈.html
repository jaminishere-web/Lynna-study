<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인권 보장과 기본권 — 암기 퀴즈 50</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f7f4ef;
    --card-bg: #ffffff;
    --border: #e5dfd6;
    --primary: #6b3fa0;
    --primary-light: #9b6dca;
    --accent: #e05c2a;
    --text: #1a1a1a;
    --text-muted: #888;
    --answer-bg: #f3ecfc;
    --answer-text: #4a1a80;
    --tag1: #ede7f6; --tag1-text: #4527a0;
    --tag2: #e8f5e9; --tag2-text: #1b5e20;
    --tag3: #fff8e1; --tag3-text: #e65100;
    --tag4: #fce4ec; --tag4-text: #880e4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: var(--primary);
    color: #fff;
    padding: 26px 20px 18px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 900; }
  header p { font-size: 0.77rem; opacity: 0.82; margin-top: 4px; }

  .stats-bar {
    background: var(--primary-light);
    color: #fff;
    display: flex; justify-content: center; gap: 28px;
    padding: 7px 20px; font-size: 0.82rem; font-weight: 700;
  }

  .tab-bar {
    display: flex; overflow-x: auto;
    background: #fff; border-bottom: 2px solid var(--border);
    position: sticky; top: 71px; z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 10px 15px;
    font-size: 0.79rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: none; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .controls {
    display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap;
  }
  .btn {
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px; transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: right; }

  .cards-grid { display: flex; flex-direction: column; gap: 10px; padding: 4px 14px; }

  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .q-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }
  .q-body { flex: 1; }
  .q-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-bottom: 5px;
  }
  .q-text { font-size: 0.9rem; font-weight: 500; line-height: 1.55; }

  .card-answer { display: none; padding: 0 14px 14px 54px; }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg); border-radius: 10px;
    padding: 10px 14px; font-size: 0.88rem; font-weight: 700;
    color: var(--answer-text); line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem; font-weight: 900; letter-spacing: 0.5px;
    color: var(--primary-light); margin-bottom: 4px; display: block;
  }

  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }
  .t4 { background: var(--tag4); color: var(--tag4-text); }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>

<header>
  <h1>⚖️ 인권 보장과 기본권</h1>
  <p>Ⅰ. 인권과 헌법 1단원 — 암기 퀴즈 50문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>50</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 인권</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 헌법·기본권</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 기본권 종류</button>
  <button class="tab-btn" onclick="showTab('4')">❹ 기본권 제한</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 50 확인</div>
</div>

<div id="cardContainer"></div>
<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

<script>
const questions = [
  // ── ❶ 인권의 의미와 보장의 중요성 (12문제) ──
  { id:1,  tab:'1', tag:'인권의 의미', q:'인간이 마땅히 누려야 할 기본적인 권리를 무엇이라 하는가?', a:'인권' },
  { id:2,  tab:'1', tag:'인권의 의미', q:'인권은 인간이 태어날 때부터 본래 지닌 권리이다. 즉 국가에서 법이나 제도로 보장하기 이전부터 인간에게 자연적으로 부여된 권리를 무엇이라 하는가?', a:'천부 인권(자연권)' },
  { id:3,  tab:'1', tag:'인권의 의미', q:'인권은 인종, 성별, 신분 등을 뛰어넘어 모든 사람이 동등하게 누릴 수 있는 권리이다. 이를 어떤 말로 표현하는가?', a:'보편적인 권리' },
  { id:4,  tab:'1', tag:'인권의 의미', q:'세계 인권 선언 제1조에서 모든 인간은 태어날 때부터 자유로우며 ( )과 ( )에 있어서 평등하다고 선언한다.', a:'존엄성 / 권리' },
  { id:5,  tab:'1', tag:'인권 보장의 중요성', q:'인권을 제대로 보장받지 못하면 인간이 어떤 삶을 살 수 없는가?', a:'인간다운 삶' },
  { id:6,  tab:'1', tag:'인권 보장의 중요성', q:'모든 인간이 인격적 존재로서 존중받으며 최소한의 인간다운 삶을 살기 위해서는 무엇을 보장하는 것이 중요한가?', a:'인권 보장' },

  { id:9,  tab:'1', tag:'인권의 의미', q:'사람들의 모습이나 생각은 서로 다르지만 ( )이기 때문에 누구나 똑같이 존중받으며 살아갈 권리가 있다.', a:'인간' },
  { id:10, tab:'1', tag:'인권 보장의 중요성', q:'인권 보장이 중요한 이유 두 가지를 쓰시오.', a:'① 인간다운 삶을 살기 위해 ② 자유롭고 행복하게 살기 위해' },
  { id:11, tab:'1', tag:'인권의 의미', q:'인권은 국가가 법으로 만들어 주는 권리인가, 태어날 때부터 갖는 권리인가?', a:'태어날 때부터 갖는 권리(천부 인권)' },
  { id:12, tab:'1', tag:'인권의 의미', q:'인권은 인종·성별·신분과 관계없이 모든 사람이 누릴 수 있는가?', a:'그렇다 (보편적 권리)' },

  { id:22, tab:'2', tag:'인권 보호 수단', q:'인권을 보호하기 위한 수단 세 가지는?', a:'헌법, 법률, 제도 시행' },
  { id:23, tab:'2', tag:'인권 보호 수단', q:'장애인 차별 금지 및 권리 구제 등에 관한 법률은 인권을 보호하기 위한 어떤 수단인가?', a:'법률' },
  { id:24, tab:'2', tag:'헌법과 기본권', q:'우리 헌법이 보장하는 기본권의 종류 다섯 가지는?', a:'자유권, 평등권, 참정권, 사회권, 청구권' },

  { id:45, tab:'4', tag:'기본권 제한의 한계', q:'우리 헌법은 기본권을 무엇으로써만 제한할 수 있도록 규정하는가?', a:'법률' },
  { id:46, tab:'4', tag:'기본권 제한의 한계', q:'기본권을 제한하더라도 침해할 수 없는 것은?', a:'자유와 권리의 본질적인 내용' },
  { id:47, tab:'4', tag:'기본권 제한의 한계', q:'국가가 기본권 제한의 한계를 엄격하게 정한 이유는?', a:'국가 권력의 남용을 방지하고 국민의 자유와 권리를 최대한 보장하기 위해' },
  { id:48, tab:'4', tag:'기본권 제한 사례', q:'청소년 보호법에 따라 사업자가 청소년에게 술이나 담배 같은 청소년 유해 약물을 판매해서는 안 되는 것은 어떤 기본권을 제한한 것인가?', a:'경제 활동의 자유(사회·경제적 자유권)' },
  { id:49, tab:'4', tag:'기본권 제한 사례', q:'찜질방이나 노래방, 게임방 등에서 청소년의 야간 출입을 원칙적으로 제한하는 것은 무엇을 보호하기 위한 것인가?', a:'청소년(유해 환경으로부터 청소년 보호)' },
  { id:50, tab:'4', tag:'스스로 확인', q:'(1) 자유권 (2) 평등권 (3) 참정권 (4) 사회권 (5) 청구권을 각각 한 줄로 설명하시오.', a:'① 자유권: 국가 간섭 없이 자유롭게 생활할 권리 ② 평등권: 부당한 차별을 받지 않을 권리 ③ 참정권: 국가 정치 과정에 참여할 권리 ④ 사회권: 인간다운 생활 보장을 요구할 권리 ⑤ 청구권: 국가에 일정한 행위를 요구할 권리' },
];

const TOTAL = 50;
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return { '1':'t1', '2':'t2', '3':'t3', '4':'t4' }[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  revealedSet.has(id) ? revealedSet.delete(id) : revealedSet.add(id);
  updateStats(); renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  document.getElementById('progressFill').style.width = Math.round(count/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent = `${count} / ${TOTAL} 확인`;
}

function showTab(tab) {
  currentTab = tab;
  const tabs = ['all','1','2','3','4'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats(); renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats(); renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
