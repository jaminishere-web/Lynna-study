<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가야 연맹이 성장하다 단답형 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2A5C3F;
    --green-light: #3D8A5C;
    --green-dark: #163D28;
    --cream: #F2F7F4;
    --dark: #121A15;
    --muted: #4A6355;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #E4EDE7;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(42,92,63,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(22,61,40,0.08) 0%, transparent 50%);
    color: #121A15;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .header::before {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--green-light), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--green-dark);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 900;
    color: #121A15;
    line-height: 1.25;
    margin-bottom: 8px;
  }

  h1 span { color: var(--green-dark); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-dark), transparent);
    margin: 24px auto 0;
  }

  .timeline {
    max-width: 900px;
    margin: 0 auto 48px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
  }

  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    position: relative;
  }

  .tl-item:not(:last-child)::after {
    content: '▶';
    position: absolute;
    right: -8px;
    top: 8px;
    font-size: 10px;
    color: var(--green-light);
  }

  .tl-year {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 4px;
  }

  .tl-event {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary {
    background: var(--green-dark);
    color: #F2F7F4;
  }

  .btn-primary:hover {
    background: var(--green);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(42,92,63,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: var(--green-dark);
    border: 1px solid var(--green);
  }

  .btn-secondary:hover {
    background: rgba(42,92,63,0.07);
    color: #121A15;
  }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: rgba(42,92,63,0.12);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dark), var(--green-light));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: #FFFFFF;
    border: 1px solid rgba(42,92,63,0.2);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green-dark);
    transition: background 0.3s;
  }

  .question-card:hover {
    background: #F5FAF7;
    border-color: rgba(42,92,63,0.38);
  }

  .question-card.revealed {
    background: #EDF5F0;
    border-color: rgba(42,92,63,0.38);
  }

  .question-card.revealed::before { background: var(--green-light); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--green-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: #121A15;
    flex: 1;
  }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show {
    max-height: 220px;
    opacity: 1;
  }

  .answer-box {
    background: rgba(42,92,63,0.08);
    border-left: 2px solid var(--green-light);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-dark);
    font-weight: 600;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #121A15;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: #7A9E8A;
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--green-dark);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .section-divider::before {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-light));
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--green-light), transparent);
  }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: #FFFFFF;
    border: 1px solid rgba(42,92,63,0.2);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--muted);
  }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--green-dark);
    line-height: 1;
  }

  .score-number span {
    font-size: 16px;
    color: var(--muted);
    font-weight: 400;
  }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap, .reveal-hint { margin-left: 20px; }
    .tl-item { padding: 0 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 삼국의 성립과 발전</div>
  <h1>가야 연맹이<br><span>성장하다</span></h1>
  <p class="subtitle">단답형 30문제 · 클릭하여 정답 확인</p>
</div>

<div class="timeline">
  <div class="tl-item"><div class="tl-year">42</div><div class="tl-event">금관가야 건국</div></div>
  <div class="tl-item"><div class="tl-year">532</div><div class="tl-event">금관가야 멸망</div></div>
  <div class="tl-item"><div class="tl-year">562</div><div class="tl-event">대가야 멸망</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 30 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 30</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [

  // ─── 가야 연맹의 성립 ───
  { section: "가야 연맹의 성립", q: "가야 연맹은 어느 나라가 성립할 무렵 어느 지역의 작은 나라들이 연합하여 형성하였는가?", a: "삼국이 성립할 무렵, 변한 지역" },
  { section: "가야 연맹의 성립", q: "가야 연맹의 특징 두 가지를 쓰시오.", a: "각 나라가 독자성을 유지, 강한 나라가 연맹을 이끔" },
  { section: "가야 연맹의 성립", q: "가야 연맹 초기에 연맹을 주도한 나라는 어디인가?", a: "금관가야(김해)" },
  { section: "가야 연맹의 성립", q: "금관가야가 건국된 연도는?", a: "42년" },

  // ─── 금관가야의 발전 ───
  { section: "금관가야의 발전", q: "금관가야가 우수한 철기를 만들 수 있었던 지리적 이유는 무엇인가?", a: "낙동강 하류에 풍부한 철 생산지가 있었기 때문" },
  { section: "금관가야의 발전", q: "금관가야의 기름진 땅에서 철제 농기구를 이용해 높아진 것은 무엇인가?", a: "농업 생산량(농업 생산력)" },
  { section: "금관가야의 발전", q: "금관가야가 자리 잡은 지역의 지리적 장점은 무엇인가?", a: "해상 교통의 요지" },
  { section: "금관가야의 발전", q: "금관가야가 해상 교통을 바탕으로 교류한 두 나라는 어디인가?", a: "낙랑, 왜(일본)" },
  { section: "금관가야의 발전", q: "금관가야의 발전 기반이 된 두 가지 요소를 쓰시오.", a: "발달한 철기 문화, 해상 무역" },

  // ─── 금관가야의 쇠퇴 ───
  { section: "금관가야의 쇠퇴", q: "4세기 이후 금관가야가 점차 세력이 약해진 이유는 무엇인가?", a: "신라와의 경쟁" },
  { section: "금관가야의 쇠퇴", q: "금관가야가 위기 극복을 위해 강화한 관계 두 가지를 쓰시오.", a: "백제, 왜와의 관계 강화" },
  { section: "금관가야의 쇠퇴", q: "5세기 고구려가 신라에 침입한 왜를 물리치는 과정에서 금관가야가 받은 피해는?", a: "큰 타격을 입어 연맹 맹주로서의 지위 상실" },
  { section: "금관가야의 쇠퇴", q: "금관가야가 신라에 병합된 연도는?", a: "532년" },
  { section: "금관가야의 쇠퇴", q: "금관가야를 병합한 신라의 왕은 누구인가?", a: "법흥왕" },

  // ─── 대가야의 발전 ───
  { section: "대가야의 발전", q: "금관가야가 쇠퇴한 이후 가야 연맹의 주도권을 장악한 나라는 어디인가?", a: "대가야(고령)" },
  { section: "대가야의 발전", q: "대가야가 연맹을 이끌 수 있었던 두 가지 경제적 기반은 무엇인가?", a: "비옥한 토지, 질 좋은 철기 생산" },
  { section: "대가야의 발전", q: "5세기 후반 대가야가 세력을 확장한 방향은 어디인가?", a: "소백산맥 서쪽" },
  { section: "대가야의 발전", q: "대가야가 사신을 보내 교류한 중국 나라는 어디인가?", a: "중국 남조" },
  { section: "대가야의 발전", q: "대가야가 교류한 또 다른 나라는 어디인가?", a: "왜(일본)" },
  { section: "대가야의 발전", q: "대가야가 신라를 도운 일은 무엇인가?", a: "신라에 침입한 고구려를 물리치는 데 도움을 줌" },
  { section: "대가야의 발전", q: "대가야에서 '대왕(大王)'이라는 명칭을 사용하였음을 알 수 있는 유물은 무엇인가?", a: "대왕(大王) 글자가 새겨진 항아리(고령 지역 출토)" },

  // ─── 가야 연맹의 한계와 멸망 ───
  { section: "가야 연맹의 한계와 멸망", q: "가야 연맹이 강력한 국가로 성장하지 못한 근본적인 이유는 무엇인가?", a: "각 소국이 독자적인 권력을 유지하여 지배력을 하나로 모으지 못함" },
  { section: "가야 연맹의 한계와 멸망", q: "6세기 이후 가야 연맹의 세력이 약해진 외부 요인 두 가지를 쓰시오.", a: "백제와 신라의 대립, 두 나라의 압력을 받음" },
  { section: "가야 연맹의 한계와 멸망", q: "대가야가 신라 진흥왕의 공격을 받아 멸망한 연도는?", a: "562년" },

  // ─── 가야의 문화 — 상형 토기 ───
  { section: "가야의 문화 — 상형 토기", q: "상형 토기란 무엇인가?", a: "인물, 동물, 물건의 모양을 본떠서 만든 토기" },
  { section: "가야의 문화 — 상형 토기", q: "상형 토기가 주로 발견되는 두 나라의 옛 지역은 어디인가?", a: "신라, 가야" },
  { section: "가야의 문화 — 상형 토기", q: "상형 토기는 주로 어떤 용도로 만들어진 것으로 보는가?", a: "무덤에 넣기 위해 만든 것" },
  { section: "가야의 문화 — 상형 토기", q: "집 모양 토기를 통해 알 수 있는 당시 생활 모습은 무엇인가?", a: "당시의 창고 모습과 구조" },
  { section: "가야의 문화 — 상형 토기", q: "배 모양 토기를 통해 짐작할 수 있는 두 가지는 무엇인가?", a: "배의 구조, 항해술" },

  // ─── 지산동 고분군 ───
  { section: "지산동 고분군(대가야의 흔적)", q: "지산동 고분군이 위치한 곳은 어디인가?", a: "경북 고령" },
  { section: "지산동 고분군(대가야의 흔적)", q: "지산동 고분군의 무덤 형태의 특징은 무엇인가?", a: "산등성이에 있으며 정상으로 갈수록 규모가 크다" },
  { section: "지산동 고분군(대가야의 흔적)", q: "지산동 고분군에서 출토된 유물 세 가지를 쓰시오.", a: "금동관, 갑옷(판갑옷과 투구), 철기" },
];

let revealed = new Set();
const TOTAL = questions.length;

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';

  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.dataset.id = item._id;
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  const shuffled = [...questions].sort(() => Math.random() - 0.5);
  buildCards(shuffled);
}

function updateProgress() {
  const count = revealed.size;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progressText').textContent = `${count} / ${TOTAL} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${TOTAL}</span>`;
}

questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
</body>
</html>
