<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법원과 헌법재판소 — 암기 퀴즈 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f4f6f2;
    --card-bg: #ffffff;
    --border: #d8e0d0;
    --primary: #3a5a2a;
    --primary-light: #5a8c45;
    --accent: #b5451b;
    --text: #1a1a1a;
    --text-muted: #888;
    --answer-bg: #eaf2e4;
    --answer-text: #1e3d10;
    --tag1: #e6f0e0; --tag1-text: #2e5c1a;
    --tag2: #e8f0fb; --tag2-text: #1a3a6b;
    --tag3: #fff4e0; --tag3-text: #7a3a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }

  header {
    background: var(--primary); color: #fff;
    padding: 26px 20px 18px; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 900; }
  header p { font-size: 0.77rem; opacity: 0.82; margin-top: 4px; }

  .stats-bar {
    background: var(--primary-light); color: #fff;
    display: flex; justify-content: center; gap: 28px;
    padding: 7px 20px; font-size: 0.82rem; font-weight: 700;
  }

  .tab-bar {
    display: flex; overflow-x: auto;
    background: #fff; border-bottom: 2px solid var(--border);
    position: sticky; top: 71px; z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 10px 15px;
    font-size: 0.79rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: none; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .controls { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
  .btn {
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px; transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: right; }

  .cards-grid { display: flex; flex-direction: column; gap: 10px; padding: 4px 14px; }

  .card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .q-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }
  .q-body { flex: 1; }
  .q-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-bottom: 5px;
  }
  .q-text { font-size: 0.9rem; font-weight: 500; line-height: 1.55; }

  .card-answer { display: none; padding: 0 14px 14px 54px; }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg); border-radius: 10px;
    padding: 10px 14px; font-size: 0.88rem; font-weight: 700;
    color: var(--answer-text); line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem; font-weight: 900; letter-spacing: 0.5px;
    color: var(--primary-light); margin-bottom: 4px; display: block;
  }

  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>

<header>
  <h1>⚖️ 법원과 헌법재판소</h1>
  <p>Ⅱ. 헌법과 국가 기관 3단원 — 암기 퀴즈 30문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>30</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 법원</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 헌법재판소</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 권력분립·확인</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 30 확인</div>
</div>

<div id="cardContainer"></div>
<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

<script>
const questions = [
  // ── ❶ 법원 (14문제) ──
  { id:1,  tab:'1', tag:'사법의 의미', q:'법에 따라 분쟁이나 범죄를 해결하는 국가 작용을 무엇이라 하는가?', a:'사법(司法)' },
  { id:2,  tab:'1', tag:'사법의 의미', q:'사법을 담당하는 국가 기관은?', a:'법원' },
  { id:3,  tab:'1', tag:'법원의 기능', q:'법원은 어떤 역할을 하는가?', a:'법에 따라 분쟁을 해결하고 범죄자를 처벌하며 국민의 권리와 이익을 보호한다' },
  { id:4,  tab:'1', tag:'법원의 종류', q:'법원의 종류를 심급이 낮은 순서부터 쓰시오.', a:'지방 법원 → 고등 법원 → 대법원' },
  { id:5,  tab:'1', tag:'법원의 종류', q:'우리나라 최고 법원은?', a:'대법원' },
  { id:6,  tab:'1', tag:'법원의 종류', q:'대법원장은 누가 임명하는가?', a:'대통령이 국회의 동의를 얻어 임명' },
  { id:7,  tab:'1', tag:'심급 제도', q:'같은 사건을 여러 단계의 법원에서 재판받을 수 있게 하는 제도는?', a:'심급 제도(3심 제도)' },
  { id:8,  tab:'1', tag:'심급 제도', q:'심급 제도를 두는 이유는?', a:'재판의 잘못을 바로잡아 국민의 권리를 보호하기 위해' },
  { id:9,  tab:'1', tag:'심급 제도', q:'1심 판결에 불복할 때 상급 법원에 다시 재판을 청구하는 것을 무엇이라 하는가?', a:'항소(1심→2심)' },
  { id:10, tab:'1', tag:'심급 제도', q:'2심 판결에 불복할 때 최고 법원에 다시 재판을 청구하는 것을 무엇이라 하는가?', a:'상고(2심→3심/대법원)' },
  { id:11, tab:'1', tag:'사법권 독립', q:'법원이 다른 국가 기관의 간섭 없이 독립적으로 재판하는 원칙을 무엇이라 하는가?', a:'사법권의 독립' },
  { id:12, tab:'1', tag:'사법권 독립', q:'사법권의 독립이 중요한 이유는?', a:'공정한 재판을 통해 국민의 권리를 보호하기 위해' },
  { id:13, tab:'1', tag:'사법권 독립', q:'법관은 헌법과 법률에 의하여 ( ) 에 따라 독립하여 심판한다.', a:'양심' },
  { id:14, tab:'1', tag:'법원의 기능', q:'법원은 행정부의 잘못된 행정 행위를 취소하거나 변경할 수 있는 재판을 하는데, 이를 무엇이라 하는가?', a:'행정 재판(행정 소송)' },

  // ── ❷ 헌법재판소 (10문제) ──
  { id:15, tab:'2', tag:'헌법재판소의 의미', q:'헌법과 관련된 분쟁을 해결하고 헌법 질서를 수호하는 국가 기관은?', a:'헌법재판소' },
  { id:16, tab:'2', tag:'헌법재판소의 구성', q:'헌법재판소 재판관은 모두 몇 명인가?', a:'9명' },
  { id:17, tab:'2', tag:'헌법재판소의 구성', q:'헌법재판소 재판관 9명은 누가 임명하는가?', a:'대통령이 임명 (국회 선출 3명, 대법원장 지명 3명, 대통령 지명 3명)' },
  { id:18, tab:'2', tag:'헌법재판소의 기능', q:'국회가 만든 법률이 헌법에 위반되는지 여부를 심판하는 헌법재판소의 권한은?', a:'위헌 법률 심판' },
  { id:19, tab:'2', tag:'헌법재판소의 기능', q:'공권력에 의해 기본권을 침해당한 국민이 헌법재판소에 청구하는 것은?', a:'헌법 소원 심판' },
  { id:20, tab:'2', tag:'헌법재판소의 기능', q:'대통령, 국무총리, 장관, 법관 등이 헌법이나 법률을 위반한 경우 국회가 탄핵 소추를 의결하면 헌법재판소가 하는 심판은?', a:'탄핵 심판' },
  { id:21, tab:'2', tag:'헌법재판소의 기능', q:'민주적 기본 질서에 위배되는 정당의 해산을 심판하는 헌법재판소의 권한은?', a:'정당 해산 심판' },
  { id:22, tab:'2', tag:'헌법재판소의 기능', q:'국가 기관 간의 권한 분쟁을 해결하는 헌법재판소의 권한은?', a:'권한 쟁의 심판' },
  { id:23, tab:'2', tag:'헌법재판소의 기능', q:'헌법재판소의 심판 종류 다섯 가지를 쓰시오.', a:'위헌 법률 심판, 헌법 소원 심판, 탄핵 심판, 정당 해산 심판, 권한 쟁의 심판' },
  { id:24, tab:'2', tag:'헌법재판소의 역할', q:'헌법재판소가 존재하는 이유는?', a:'헌법 질서를 수호하고 국민의 기본권을 보장하기 위해' },

  // ── ❸ 권력 분립·스스로 확인 (6문제) ──
  { id:25, tab:'3', tag:'권력 분립', q:'국가 권력을 입법부·행정부·사법부로 나누어 서로 견제하고 균형을 이루게 하는 원리는?', a:'권력 분립(삼권 분립)' },
  { id:26, tab:'3', tag:'권력 분립', q:'권력 분립의 목적은?', a:'국가 권력의 남용을 방지하고 국민의 자유와 권리를 보장하기 위해' },
  { id:27, tab:'3', tag:'권력 분립', q:'국회(입법부)가 법원(사법부)을 견제하는 방법은?', a:'법관 탄핵 소추 의결, 대법원장 임명 동의권 행사' },
  { id:28, tab:'3', tag:'권력 분립', q:'법원(사법부)이 국회(입법부)를 견제하는 방법은?', a:'위헌 법률 심판 제청(헌법재판소를 통해 법률의 위헌 여부 판단)' },
  { id:29, tab:'3', tag:'스스로 확인', q:'법원은 헌법이나 법률에 어긋나는 행정부의 처분을 취소할 수 있다. (O/X)', a:'O' },
  { id:30, tab:'3', tag:'스스로 확인', q:'(1) 대통령이 법관을 임명한다는 것은 행정부가 사법부를 견제하는 것이다. (O/X) (2) 국회가 대법원장 임명에 동의권을 행사하는 것은 입법부가 사법부를 견제하는 것이다. (O/X)', a:'(1) O  (2) O' },
];

const TOTAL = 30;
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return { '1':'t1', '2':'t2', '3':'t3' }[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  revealedSet.has(id) ? revealedSet.delete(id) : revealedSet.add(id);
  updateStats(); renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  document.getElementById('progressFill').style.width = Math.round(count/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent = `${count} / ${TOTAL} 확인`;
}

function showTab(tab) {
  currentTab = tab;
  const tabs = ['all','1','2','3'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats(); renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats(); renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
</body>
</html>
