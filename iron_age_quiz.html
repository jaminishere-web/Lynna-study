<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>철기 시대 단답형 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --iron: #4A5568;
    --iron-light: #718096;
    --iron-dark: #2D3748;
    --cream: #F7F3EE;
    --dark: #1A202C;
    --stone: #718096;
    --steel: #E2E8F0;
    --parchment: #EDE0C4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #F0EDE8;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(74,85,104,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(45,55,72,0.07) 0%, transparent 50%);
    color: #1A202C;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
  }

  .header::before {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--iron), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--iron-dark);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    color: #1A202C;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  h1 span { color: var(--iron-dark); }

  .subtitle {
    font-size: 13px;
    color: #4A5568;
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--iron-dark), transparent);
    margin: 24px auto 0;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary {
    background: var(--iron-dark);
    color: #F7F3EE;
  }

  .btn-primary:hover {
    background: var(--iron);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(45,55,72,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: #2D3748;
    border: 1px solid var(--iron);
  }

  .btn-secondary:hover {
    background: rgba(74,85,104,0.08);
    color: #1A202C;
  }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #4A5568;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: rgba(74,85,104,0.15);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--iron-dark), var(--iron));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: #FFFFFF;
    border: 1px solid rgba(74,85,104,0.25);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--iron-dark);
    transition: background 0.3s;
  }

  .question-card:hover {
    background: #F7F9FC;
    border-color: rgba(74,85,104,0.45);
  }

  .question-card.revealed {
    background: #F0F4F8;
    border-color: rgba(74,85,104,0.45);
  }

  .question-card.revealed::before { background: var(--iron); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--iron-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: #1A202C;
    flex: 1;
  }

  .q-text strong {
    color: var(--iron-dark);
    font-weight: 600;
  }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show {
    max-height: 200px;
    opacity: 1;
  }

  .answer-box {
    background: rgba(74,85,104,0.08);
    border-left: 2px solid var(--iron);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--iron-dark);
    font-weight: 600;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #1A202C;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: #718096;
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--iron-dark);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .section-divider::before {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--iron));
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--iron), transparent);
  }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: #FFFFFF;
    border: 1px solid rgba(74,85,104,0.25);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: #4A5568;
  }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--iron-dark);
    line-height: 1;
  }

  .score-number span {
    font-size: 16px;
    color: #4A5568;
    font-weight: 400;
  }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap, .reveal-hint { margin-left: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 철기 시대</div>
  <h1>철기가 보급되어<br><span>사회에 변화가 나타나다</span></h1>
  <p class="subtitle">단답형 25문제 · 클릭하여 정답 확인</p>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 25 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 25</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [
  // ─── 철기의 보급 ───
  { section: "철기의 보급", q: "철기가 중국으로부터 만주와 한반도에 처음 전해진 시기는 기원전 몇 세기경인가?", a: "기원전 5세기경" },
  { section: "철기의 보급", q: "철기가 만주와 한반도에서 널리 사용되기 시작한 시기는 기원전 몇 세기인가?", a: "기원전 1세기" },
  { section: "철기의 보급", q: "철의 원료인 철광석은 청동의 원료인 무엇보다 매장량이 많아 구하기 쉬웠는가?", a: "구리(동)" },
  { section: "철기의 보급", q: "철기가 청동기보다 우수한 두 가지 특성은 무엇인가?", a: "단단하고 날카롭다" },
  { section: "철기의 보급", q: "철기가 보급된 이후 청동기는 주로 어떤 용도로만 사용되었는가?", a: "의식용 도구나 장신구" },

  // ─── 철기 제작 과정 ───
  { section: "철기 제작 과정", q: "철기 제작의 첫 번째 단계로, 철 덩어리를 녹여 만드는 것은 무엇인가?", a: "순수한 쇳물" },
  { section: "철기 제작 과정", q: "쇳물을 거푸집에 넣어 하는 작업은 무엇인가?", a: "모양을 만든다" },
  { section: "철기 제작 과정", q: "달구어진 쇠를 두드리고 식히는 과정을 반복하면 무엇이 만들어지는가?", a: "강철" },
  { section: "철기 제작 과정", q: "철기 제작의 마지막 단계는 무엇인가?", a: "모양을 정교하게 다듬는다" },

  // ─── 철기의 사용과 사회 변화 ───
  { section: "철기의 사용과 사회 변화", q: "철로 만든 농기구의 특성 두 가지로 인해 가능해진 농업 변화는 무엇인가?", a: "땅을 깊이 갈 수 있어 농업 생산량 증가" },
  { section: "철기의 사용과 사회 변화", q: "철제 무기의 어떤 특성이 전쟁을 활발하게 만들었는가?", a: "예리하고 튼튼하다" },
  { section: "철기의 사용과 사회 변화", q: "철기를 활용하여 세력을 키운 부족들이 취한 두 가지 행동은 무엇인가?", a: "주변 부족을 정복하거나 연합" },
  { section: "철기의 사용과 사회 변화", q: "철기 보급의 결과로 만주와 한반도에 나타난 변화는 무엇인가?", a: "여러 나라가 생겨나기 시작했다" },
  { section: "철기의 사용과 사회 변화", q: "철기 시대 유적에서 중국과의 교역 사실을 보여 주는 화폐 유물은 무엇인가?", a: "명도전" },
  { section: "철기의 사용과 사회 변화", q: "명도전은 중국의 어느 시대에 사용한 화폐인가?", a: "전국 시대" },
  { section: "철기의 사용과 사회 변화", q: "경남 창원 다호리 유적에서 발견된 유물로, 한반도에 한자가 전래되었음을 알려주는 것은 무엇인가?", a: "붓" },

  // ─── 다호리 유적 ───
  { section: "다호리 유적", q: "다호리 유적이 위치한 지역은 어디인가?", a: "경남 창원" },
  { section: "다호리 유적", q: "다호리 유적은 어느 시대의 유적인가?", a: "초기 철기 시대" },
  { section: "다호리 유적", q: "다호리 유적에서 발견된 무덤의 두 가지 형태를 쓰시오.", a: "널무덤(나무 관), 목곽묘(통나무로 만든 넓)" },
  { section: "다호리 유적", q: "다호리 유적 무덤 안에서 출토된 중국과의 교류를 보여 주는 유물 두 가지를 쓰시오.", a: "동전(화폐), 거울" },
  { section: "다호리 유적", q: "다호리에서 발견된 쇠도끼의 특징은 어떻게 만든 것인가?", a: "쇠판을 나무 자루에 끼워 만든 도끼" },
  { section: "다호리 유적", q: "다호리에서 발견된 철기 그릇(검은 칠을 한 그릇)에는 발견 당시 무엇이 담겨 있었는가?", a: "엿매" },
  { section: "다호리 유적", q: "다호리에서 발견된 붓의 특징을 한 가지 쓰시오.", a: "붓털이 양쪽에 있다" },

  // ─── 종합 ───
  { section: "종합·심화", q: "철기 시대에 청동 검도 함께 출토되는 이유는 무엇을 보여 주기 위함인가?", a: "청동기에서 철기로 바뀌는 과도기적 과정" },
  { section: "종합·심화", q: "철기 보급이 농업과 군사 두 분야에 각각 미친 핵심 영향을 한 문장으로 서술하시오.", a: "농업 생산량이 늘고, 강력한 철제 무기로 전쟁이 활발해져 국가가 형성되었다" },
];

let revealed = new Set();
const TOTAL = questions.length;

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';

  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.dataset.id = item._id;
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  const shuffled = [...questions].sort(() => Math.random() - 0.5);
  buildCards(shuffled);
}

function updateProgress() {
  const count = revealed.size;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progressText').textContent = `${count} / ${TOTAL} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${TOTAL}</span>`;
}

questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
</body>
</html>
