<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국회 — 암기 퀴즈 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f5f0fb;
    --card-bg: #ffffff;
    --border: #e0d4f5;
    --primary: #5c2d91;
    --primary-light: #8e5cc7;
    --accent: #c0392b;
    --text: #1a1a1a;
    --text-muted: #888;
    --answer-bg: #f0e8fc;
    --answer-text: #3b1a6b;
    --tag1: #ede7f6; --tag1-text: #4527a0;
    --tag2: #e8f5e9; --tag2-text: #1b5e20;
    --tag3: #fff8e1; --tag3-text: #e65100;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }

  header {
    background: var(--primary); color: #fff;
    padding: 26px 20px 18px; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 900; }
  header p { font-size: 0.77rem; opacity: 0.82; margin-top: 4px; }

  .stats-bar {
    background: var(--primary-light); color: #fff;
    display: flex; justify-content: center; gap: 28px;
    padding: 7px 20px; font-size: 0.82rem; font-weight: 700;
  }

  .tab-bar {
    display: flex; overflow-x: auto;
    background: #fff; border-bottom: 2px solid var(--border);
    position: sticky; top: 71px; z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 10px 15px;
    font-size: 0.79rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: none; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .controls { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
  .btn {
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px; transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: right; }

  .cards-grid { display: flex; flex-direction: column; gap: 10px; padding: 4px 14px; }

  .card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .q-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }
  .q-body { flex: 1; }
  .q-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-bottom: 5px;
  }
  .q-text { font-size: 0.9rem; font-weight: 500; line-height: 1.55; }

  .card-answer { display: none; padding: 0 14px 14px 54px; }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg); border-radius: 10px;
    padding: 10px 14px; font-size: 0.88rem; font-weight: 700;
    color: var(--answer-text); line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem; font-weight: 900; letter-spacing: 0.5px;
    color: var(--primary-light); margin-bottom: 4px; display: block;
  }

  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>

<header>
  <h1>🏛️ 국회</h1>
  <p>Ⅱ. 헌법과 국가 기관 1단원 — 암기 퀴즈 30문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>30</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 위상·구성</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 국회의 기능</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 입법 절차·확인</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 30 확인</div>
</div>

<div id="cardContainer"></div>
<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

<script>
const questions = [
  // ── ❶ 국회의 위상과 구성 (12문제) ──
  { id:1,  tab:'1', tag:'국회의 위상', q:'국민이 자신을 대신하여 국가의 의사를 결정하도록 선출한 사람을 무엇이라 하는가?', a:'국회 의원' },
  { id:2,  tab:'1', tag:'국회의 위상', q:'국회 의원들이 모여 법을 만들고 국가의 주요 의사를 결정하는 국가 기관은?', a:'국회' },
  { id:3,  tab:'1', tag:'국회의 위상', q:'법을 만드는 국가 작용을 무엇이라 하며, 이 때문에 국회를 무엇이라고도 하는가?', a:'입법 / 입법부(立法府)' },
  { id:4,  tab:'1', tag:'국회의 위상', q:'국회는 국민이 직접 뽑은 대표들로 구성된 국민의 ( ) 기관이자 법률을 만들거나 고치는 ( ) 기관이다.', a:'대표 / 입법' },
  { id:5,  tab:'1', tag:'국회의 위상', q:'국회는 국가 권력의 남용을 막고 국민의 기본권을 보장하기 위해 행정부와 법원을 비롯한 국가 기관들을 어떻게 하는가?', a:'감시하고 견제한다' },
  { id:6,  tab:'1', tag:'국회의 위상', q:'헌법 제40조의 내용은?', a:'입법권은 국회에 속한다' },
  { id:7,  tab:'1', tag:'국회의 구성', q:'우리나라 국회는 어떤 두 종류의 의원으로 구성되는가?', a:'지역구 국회 의원, 비례 대표 국회 의원' },
  { id:8,  tab:'1', tag:'국회의 구성', q:'지역구 국회 의원은 어떻게 선출되는가?', a:'각 지역구에서 최고 득표자로 선출된다' },
  { id:9,  tab:'1', tag:'국회의 구성', q:'비례 대표 국회 의원은 어떻게 선출되는가?', a:'각 정당의 득표율에 비례하여 선출된다' },
  { id:10, tab:'1', tag:'국회의 구성', q:'국회가 구성되면 국회 의원 중에서 선출하는 국회 대표 1명과 부의장 몇 명은?', a:'국회 의장 1명, 부의장 2명' },
  { id:11, tab:'1', tag:'국회의 조직', q:'국회가 효율적인 의사 진행을 위해 전문 분야별로 조직한 것은?', a:'상임 위원회' },
  { id:12, tab:'1', tag:'국회의 조직', q:'상임 위원회에서 심사한 법률안, 예산안, 청원 등을 최종적으로 결정하는 곳은?', a:'본회의' },

  // ── ❷ 국회의 기능 (12문제) ──
  { id:13, tab:'2', tag:'입법에 관한 기능', q:'국회의 대표적인 기능은?', a:'법률을 제정하고 개정하는 입법 기능' },
  { id:14, tab:'2', tag:'입법에 관한 기능', q:'국회는 헌법 개정안을 어떻게 하는가?', a:'제안하고 의결한다' },
  { id:15, tab:'2', tag:'입법에 관한 기능', q:'국가 간에 문서로 약속한 합의로, 국회의 동의를 얻으면 법률과 같은 효력이 있는 것은?', a:'조약' },
  { id:16, tab:'2', tag:'입법에 관한 기능', q:'정부가 체결한 조약에 대해 국회가 행사하는 권한은?', a:'동의권' },
  { id:17, tab:'2', tag:'재정에 관한 기능', q:'국회는 매년 행정부가 편성한 무엇을 심의하여 확정하는가?', a:'예산안' },
  { id:18, tab:'2', tag:'재정에 관한 기능', q:'국회는 행정부가 예산을 제대로 집행하였는지 무엇을 하는가?', a:'결산 심사' },
  { id:19, tab:'2', tag:'재정에 관한 기능', q:'국가 재정이란 무엇인가?', a:'국가가 행정 활동을 하기 위해 필요한 재산을 조달하고 관리하고 사용하는 모든 경제 활동' },
  { id:20, tab:'2', tag:'일반 국정에 관한 기능', q:'매년 정기적으로 행정부가 하는 일을 감사하여 바로잡는 것은?', a:'국정 감사' },
  { id:21, tab:'2', tag:'일반 국정에 관한 기능', q:'특정한 사안이 발생했을 때 그에 대해 조사하여 바로잡는 것은?', a:'국정 조사' },
  { id:22, tab:'2', tag:'일반 국정에 관한 기능', q:'대통령이 국무총리, 대법원장, 헌법재판소장 등을 임명할 때 국회가 실시하는 것은?', a:'인사 청문회' },
  { id:23, tab:'2', tag:'일반 국정에 관한 기능', q:'대통령, 국무총리, 장관, 법관 등이 헌법이나 법률을 위반했을 때 국회가 그 자리에서 물러나게 하는 권한은?', a:'탄핵 소추 의결권' },
  { id:24, tab:'2', tag:'일반 국정에 관한 기능', q:'인사 청문회란 무엇인가?', a:'후보자가 공직을 맡을 능력과 도덕성을 갖추었는지 질문과 답변을 통해 검증하는 제도적 장치' },

  // ── ❸ 법률 제정 절차·스스로 확인 (6문제) ──
  { id:25, tab:'3', tag:'법률 제정 절차', q:'우리나라에서 법률안을 제출(발의)할 수 있는 두 주체는?', a:'국회 의원 10명 이상, 정부' },
  { id:26, tab:'3', tag:'법률 제정 절차', q:'법률 제정 절차를 순서대로 쓰시오.', a:'법률안 제출·발의 → 상임 위원회 심의 → 본회의 의결 → 법률 공포' },
  { id:27, tab:'3', tag:'법률 제정 절차', q:'본회의에서 법률안이 의결되려면 재적 의원 과반수의 출석과 출석 의원 몇 분의 몇 이상의 찬성이 필요한가?', a:'과반수의 찬성' },
  { id:28, tab:'3', tag:'법률 제정 절차', q:'본회의에서 의결된 법률안은 누가 며칠 이내에 공포하는가?', a:'대통령이 15일 이내에 공포' },
  { id:29, tab:'3', tag:'스스로 확인', q:'국회는 국민의 대표 기관이자 법을 만들고 고치는 입법 기관이다. 빈칸: ( )는 국민의 대표 기관이자 법을 만들고 고치는 입법 기관이다.', a:'국회' },
  { id:30, tab:'3', tag:'스스로 확인', q:'국회의 입법 기능에 해당하는 것을 고르시오. ㄱ.국정 감사 ㄴ.탄핵 소추 의결 ㄷ.법률 제정·개정 ㄹ.헌법 개정안 의결 ㅁ.예산안 심의·확정', a:'ㄷ, ㄹ (법률 제정·개정, 헌법 개정안 의결)' },
];

const TOTAL = 30;
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return { '1':'t1', '2':'t2', '3':'t3' }[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  revealedSet.has(id) ? revealedSet.delete(id) : revealedSet.add(id);
  updateStats(); renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  document.getElementById('progressFill').style.width = Math.round(count/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent = `${count} / ${TOTAL} 확인`;
}

function showTab(tab) {
  currentTab = tab;
  const tabs = ['all','1','2','3'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats(); renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats(); renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
</body>
</html>
