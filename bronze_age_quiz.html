<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청동기 시대 단답형 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bronze: #B87333;
    --bronze-light: #D4956A;
    --bronze-dark: #7A4A1E;
    --cream: #F5EDD8;
    --dark: #1C1208;
    --stone: #8B8070;
    --moss: #4A5240;
    --parchment: #EDE0C4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #F5EDD8;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(184,115,51,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,82,64,0.08) 0%, transparent 50%);
    color: #1C1208;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
  }

  .header::before {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--bronze), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--bronze-dark);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    color: #1C1208;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  h1 span {
    color: var(--bronze-dark);
  }

  .subtitle {
    font-size: 13px;
    color: #5A5040;
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--bronze-dark), transparent);
    margin: 24px auto 0;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--bronze);
    color: var(--dark);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary:hover {
    background: var(--bronze-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(184,115,51,0.4);
  }

  .btn-secondary {
    background: transparent;
    color: #3A3020;
    border: 1px solid var(--bronze-dark);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-secondary:hover {
    border-color: var(--bronze);
    color: #1C1208;
  }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #5A5040;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: rgba(184,115,51,0.15);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bronze-dark), var(--bronze));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: #FFFFFF;
    border: 1px solid rgba(184,115,51,0.3);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--bronze-dark);
    transition: background 0.3s;
  }

  .question-card:hover {
    background: #FDF6E8;
    border-color: rgba(184,115,51,0.5);
  }

  .question-card:hover::before {
    background: var(--bronze);
  }

  .question-card.revealed {
    background: #FFF8EC;
    border-color: rgba(184,115,51,0.5);
  }

  .question-card.revealed::before {
    background: var(--bronze);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--bronze-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: #1C1208;
    flex: 1;
  }

  .q-text strong {
    color: var(--bronze-dark);
    font-weight: 600;
  }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show {
    max-height: 200px;
    opacity: 1;
  }

  .answer-box {
    background: rgba(184,115,51,0.1);
    border-left: 2px solid var(--bronze);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--bronze-dark);
    font-weight: 600;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #1C1208;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: #8B8070;
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--bronze-dark);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--bronze));
  }

  .section-divider::after {
    background: linear-gradient(90deg, var(--bronze), transparent);
  }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: #FFFFFF;
    border: 1px solid rgba(184,115,51,0.3);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: #5A5040;
  }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--bronze-dark);
    line-height: 1;
  }

  .score-number span {
    font-size: 16px;
    color: #5A5040;
    font-weight: 400;
  }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap { margin-left: 20px; }
    .reveal-hint { margin-left: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 청동기 시대</div>
  <h1>만주와 한반도의<br><span>청동기 시대</span></h1>
  <p class="subtitle">단답형 30문제 · 클릭하여 정답 확인</p>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 30 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 30</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [
  // ─── 청동기 보급 ───
  { section: "청동기 보급", q: "청동기가 만주에서 한반도로 보급되기 시작한 시기는 대략 기원전 몇 년경부터 몇 년경인가?", a: "기원전 2000년경 ~ 기원전 1500년경" },
  { section: "청동기 보급", q: "청동기는 재료가 귀하고 다루기 어려워 주로 어떤 계층의 물건을 만드는 데 사용되었는가?", a: "지배층(군장)" },
  { section: "청동기 보급", q: "청동기 시대에 농기구와 일상생활 도구는 청동 대신 무엇으로 만들어 사용했는가?", a: "정교하게 만든 석기" },
  { section: "청동기 보급", q: "청동기로 주로 만든 세 가지 물품의 종류를 쓰시오.", a: "장신구, 제사용 도구, 무기" },

  // ─── 생활과 농업 ───
  { section: "청동기 시대 생활", q: "청동기 시대에 주로 재배한 곡식 세 가지를 쓰시오.", a: "조, 피, 보리" },
  { section: "청동기 시대 생활", q: "청동기 시대 일부 지역에서 새롭게 시작된 농업 방식은 무엇인가?", a: "벼농사" },
  { section: "청동기 시대 생활", q: "청동기 시대 사람들이 곡식을 거두는 데 사용한 도구 두 가지를 쓰시오.", a: "반달 돌칼, 돌낫" },
  { section: "청동기 시대 생활", q: "청동기 시대에 곡식을 저장하거나 조리하는 데 사용한 토기 두 종류를 쓰시오.", a: "민무늬 토기, 미송리식 토기" },
  { section: "청동기 시대 생활", q: "민무늬 토기의 대표 출토 지역은 어디인가?", a: "충남 부여" },
  { section: "청동기 시대 생활", q: "미송리식 토기의 대표 출토 지역은 어디인가?", a: "평북 의주" },

  // ─── 사회 구조 ───
  { section: "사회 변화와 구조", q: "청동기 시대에 잉여 생산물이 생기면서 등장한 두 가지 사회 변화는 무엇인가?", a: "사유 재산 개념, 계급 분화" },
  { section: "사회 변화와 구조", q: "청동기 시대에 권력을 가지고 부족을 통솔하며 제사를 이끈 지배자를 무엇이라 하는가?", a: "군장(족장)" },
  { section: "사회 변화와 구조", q: "군장이 지배하는 청동기 시대 사회를 무엇이라 부르는가?", a: "재정일치 사회" },
  { section: "사회 변화와 구조", q: "청동기 시대 지배층이 죽으면 만든 두 종류의 무덤을 쓰시오.", a: "고인돌, 돌널무덤" },
  { section: "사회 변화와 구조", q: "지배층의 무덤에 함께 묻은 청동 유물 두 가지를 쓰시오.", a: "청동 검, 청동 거울" },
  { section: "사회 변화와 구조", q: "청동기 시대에 부족 간 전쟁이 발생한 두 가지 주요 이유는 무엇인가?", a: "식량 약탈, 더 좋은 땅 차지" },
  { section: "사회 변화와 구조", q: "청동기 시대에 마을을 방어하기 위해 설치한 시설 두 가지를 쓰시오.", a: "울타리, 도랑(해자)" },
  { section: "사회 변화와 구조", q: "청동기 시대 마을은 주로 어떤 지형에 세워졌는가? 그 이유와 함께 쓰시오.", a: "나지막한 언덕 — 농사와 전쟁 모두에 유리하기 때문" },

  // ─── 제사와 청동 유물 ───
  { section: "제사용 청동기", q: "청동기 시대에 부족이 농업의 풍요를 빌며 제사를 지낸 대상은 무엇인가?", a: "하늘" },
  { section: "제사용 청동기", q: "군장이 제사 시 착용하거나 사용한 청동 유물 세 가지를 쓰시오.", a: "청동 검, 청동 방울, 청동 거울" },
  { section: "제사용 청동기", q: "전남 화순에서 출토된 청동 제사 도구의 이름은 무엇인가?", a: "팔주령" },
  { section: "제사용 청동기", q: "삼성미술관 소장의 청동 제사 도구는 무엇인가?", a: "청동 방울" },
  { section: "제사용 청동기", q: "강원 양양에서 출토된, 청동 거울 중 대표적인 문양의 거울 이름은?", a: "잔무늬 거울(정문경)" },
  { section: "제사용 청동기", q: "군장이 귀한 청동 도구를 제사에 사용한 사회적 목적은 무엇인가?", a: "자신의 권위를 높이기 위해" },

  // ─── 고인돌 ───
  { section: "고인돌", q: "한반도에 있는 고인돌은 전 세계 고인돌의 약 몇 %에 해당하는가?", a: "약 40%" },
  { section: "고인돌", q: "유네스코 세계 유산으로 등재된 한반도 고인돌 세 지역을 쓰시오.", a: "전북 고창, 전남 화순, 인천 강화" },
  { section: "고인돌", q: "고인돌의 두 가지 형태를 쓰시오.", a: "탁자식 고인돌, 바둑판식 고인돌" },
  { section: "고인돌", q: "고인돌을 만들기 위해 바위에서 돌을 떼어낼 때 사용한 과학 원리는 무엇인가?", a: "쐐기의 원리 (팽창의 원리)" },
  { section: "고인돌", q: "고인돌을 세울 때 받침돌을 이용해 돌의 한쪽 면에 지렛대를 끼워 힘을 주면 돌이 움직이는 원리는?", a: "지렛대의 원리" },
  { section: "고인돌", q: "고인돌 운반 시 경사 빗면을 만들어 마찰력을 줄이는 데 사용된 과학 원리는?", a: "마찰력과 빗면의 원리" },
  { section: "고인돌", q: "고인돌 제작에 많은 노동력이 필요했다는 사실은 당시 사회에 대해 무엇을 시사하는가?", a: "강한 권력을 가진 지배자(군장)가 존재했음을 시사한다" },
];

let revealed = new Set();

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';

  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.dataset.id = item._id;
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  const shuffled = [...questions].sort(() => Math.random() - 0.5);
  buildCards(shuffled);
}

function updateProgress() {
  const count = revealed.size;
  const total = questions.length;
  const pct = Math.round(count / total * 100);
  document.getElementById('progressText').textContent = `${count} / ${total} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${total}</span>`;
}

// Init: assign stable IDs
questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
</body>
</html>
