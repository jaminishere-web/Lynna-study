<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신라가 한강 유역을 차지하다 단답형 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #7A5C1E;
    --gold-light: #B8892E;
    --gold-dark: #4E3A10;
    --cream: #F8F4EC;
    --dark: #1A1610;
    --muted: #6B5F48;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #F0EBE0;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(122,92,30,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(78,58,16,0.08) 0%, transparent 50%);
    color: #1A1610;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .header::before {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold-dark);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 900;
    color: #1A1610;
    line-height: 1.25;
    margin-bottom: 8px;
  }

  h1 span { color: var(--gold-dark); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
    margin: 24px auto 0;
  }

  /* 연표 */
  .timeline {
    max-width: 900px;
    margin: 0 auto 48px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
  }

  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    position: relative;
  }

  .tl-item:not(:last-child)::after {
    content: '▶';
    position: absolute;
    right: -8px;
    top: 8px;
    font-size: 10px;
    color: var(--gold-light);
  }

  .tl-year {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold-dark);
    margin-bottom: 4px;
  }

  .tl-event {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary {
    background: var(--gold-dark);
    color: #F8F4EC;
  }

  .btn-primary:hover {
    background: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(122,92,30,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: var(--gold-dark);
    border: 1px solid var(--gold);
  }

  .btn-secondary:hover {
    background: rgba(122,92,30,0.07);
    color: #1A1610;
  }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: rgba(122,92,30,0.12);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: #FFFFFF;
    border: 1px solid rgba(122,92,30,0.2);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold-dark);
    transition: background 0.3s;
  }

  .question-card:hover {
    background: #FBF8F2;
    border-color: rgba(122,92,30,0.38);
  }

  .question-card.revealed {
    background: #F8F3E8;
    border-color: rgba(122,92,30,0.38);
  }

  .question-card.revealed::before { background: var(--gold-light); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--gold-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: #1A1610;
    flex: 1;
  }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show {
    max-height: 220px;
    opacity: 1;
  }

  .answer-box {
    background: rgba(122,92,30,0.08);
    border-left: 2px solid var(--gold-light);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold-dark);
    font-weight: 600;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #1A1610;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: #A89870;
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--gold-dark);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .section-divider::before {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light));
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold-light), transparent);
  }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: #FFFFFF;
    border: 1px solid rgba(122,92,30,0.2);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--muted);
  }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--gold-dark);
    line-height: 1;
  }

  .score-number span {
    font-size: 16px;
    color: var(--muted);
    font-weight: 400;
  }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap, .reveal-hint { margin-left: 20px; }
    .tl-item { padding: 0 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 삼국의 성립과 발전</div>
  <h1>신라가 한강 유역을<br><span>차지하다</span></h1>
  <p class="subtitle">단답형 30문제 · 클릭하여 정답 확인</p>
</div>

<div class="timeline">
  <div class="tl-item"><div class="tl-year">기원전 57</div><div class="tl-event">신라 건국</div></div>
  <div class="tl-item"><div class="tl-year">356</div><div class="tl-event">내물왕 즉위</div></div>
  <div class="tl-item"><div class="tl-year">503</div><div class="tl-event">'왕' 칭호 사용</div></div>
  <div class="tl-item"><div class="tl-year">562</div><div class="tl-event">대가야 정복</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 30 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 30</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [

  // ─── 신라의 성립과 성장 ───
  { section: "신라의 성립과 성장", q: "신라는 어느 나라의 소국인 사로국에서 시작하였는가?", a: "진한" },
  { section: "신라의 성립과 성장", q: "사로국은 경주 일대 몇 개의 촌이 연합하여 건국하였는가?", a: "6개" },
  { section: "신라의 성립과 성장", q: "신라의 건국 연도는 기원전 몇 년인가?", a: "기원전 57년" },
  { section: "신라의 성립과 성장", q: "신라 초기에 '이사금' 자리를 돌아가며 차지한 세 성씨는 무엇인가?", a: "박씨, 석씨, 김씨" },
  { section: "신라의 성립과 성장", q: "'이사금'이라는 왕호의 뜻은 무엇인가?", a: "연장자" },
  { section: "신라의 성립과 성장", q: "신라가 4세기 중반까지 복속한 지역은 어디인가?", a: "낙동강 동쪽의 진한 소국 대부분" },

  // ─── 내물왕 시기 ───
  { section: "내물왕 시기", q: "내물왕 때부터 왕위를 독점하게 된 성씨는 무엇인가?", a: "김씨" },
  { section: "내물왕 시기", q: "내물왕 시기에 '대군장'을 뜻하는 새로운 왕호는 무엇인가?", a: "마립간" },
  { section: "내물왕 시기", q: "내물왕 시기 왜의 공격을 받은 신라가 도움을 요청한 나라는 어디인가?", a: "고구려(광개토 대왕)" },
  { section: "내물왕 시기", q: "왜군 격퇴 이후 신라가 받게 된 두 가지 영향은 무엇인가?", a: "고구려의 정치적 간섭을 받음, 고구려를 통해 중국 선진 문물 수용" },
  { section: "내물왕 시기", q: "눌지왕이 고구려의 정치적 간섭에서 벗어나기 위해 맺은 동맹은 무엇인가?", a: "백제와 동맹(나제 동맹)" },
  { section: "내물왕 시기", q: "경주 호우총에서 출토된 청동 그릇 밑바닥에 새겨진 글자는 무엇이며, 무엇을 짐작하게 하는가?", a: "'국강상광개토지호태왕' — 고구려와 신라의 관계가 긴밀했음을 짐작" },

  // ─── 국가 체제 정비(지증왕·법흥왕) ───
  { section: "국가 체제 정비 — 지증왕", q: "6세기 초 나라 이름을 '신라'로 정하고 '왕' 칭호를 처음 사용한 왕은 누구인가?", a: "지증왕" },
  { section: "국가 체제 정비 — 지증왕", q: "'왕' 칭호가 처음 사용된 연도는?", a: "503년" },
  { section: "국가 체제 정비 — 지증왕", q: "지증왕이 농업 생산성을 높이기 위해 장려한 것은 무엇인가?", a: "소를 이용한 경작(우경)" },
  { section: "국가 체제 정비 — 지증왕", q: "지증왕이 정복하여 영토를 확장한 섬은 어디인가?", a: "우산국(울릉도)" },
  { section: "국가 체제 정비 — 법흥왕", q: "율령을 반포하고 관리를 17등급으로 나눈 왕은 누구인가?", a: "법흥왕" },
  { section: "국가 체제 정비 — 법흥왕", q: "법흥왕이 관복의 색으로 구분한 것은 무엇인가?", a: "관리의 등급(관등)" },
  { section: "국가 체제 정비 — 법흥왕", q: "법흥왕이 귀족 회의인 화백 회의를 이끌게 하기 위해 설치한 직책은 무엇인가?", a: "상대등" },
  { section: "국가 체제 정비 — 법흥왕", q: "상대등의 역할은 무엇인가?", a: "귀족의 대표, 수상의 역할" },
  { section: "국가 체제 정비 — 법흥왕", q: "법흥왕이 군권을 장악하기 위해 설치한 기관은 무엇인가?", a: "병부" },
  { section: "국가 체제 정비 — 법흥왕", q: "법흥왕이 불교를 공인한 목적은 무엇인가?", a: "백성의 사상 통합" },
  { section: "국가 체제 정비 — 법흥왕", q: "법흥왕이 정복하여 지배층을 수용한 나라는 어디인가?", a: "김해의 금관가야" },
  { section: "국가 체제 정비 — 법흥왕", q: "법흥왕 시기 신라가 사용한 독자적인 연호는 무엇인가?", a: "건원" },

  // ─── 신라 왕호의 변천 ───
  { section: "신라 왕호의 변천", q: "신라 왕호의 변천 순서를 쓰시오.", a: "거서간 → 차차웅 → 이사금 → 마립간 → 왕" },
  { section: "신라 왕호의 변천", q: "'차차웅'의 뜻은 무엇인가?", a: "제사장" },
  { section: "신라 왕호의 변천", q: "'거서간'의 뜻은 무엇인가?", a: "귀인, 왕" },
  { section: "신라 왕호의 변천", q: "신라의 왕호 변화가 역사적으로 무엇을 보여 주는가?", a: "왕권이 점차 강화되었음" },

  // ─── 진흥왕의 영토 확장 ───
  { section: "진흥왕의 영토 확장", q: "6세기 중반 백제 성왕과 연합하여 고구려가 장악하던 한강 상류를 차지한 왕은 누구인가?", a: "진흥왕" },
  { section: "진흥왕의 영토 확장", q: "진흥왕이 562년에 정복한 나라는 어디인가?", a: "대가야(고령)" },
  { section: "진흥왕의 영토 확장", q: "진흥왕이 영토를 확장한 후 각지에 세운 비석의 공통된 목적은 무엇인가?", a: "영토 확장을 기념하고 지역 주민을 위무하기 위해" },
  { section: "진흥왕의 영토 확장", q: "진흥왕이 인재 양성을 위해 국가 조직으로 재편한 청소년 단체는 무엇인가?", a: "화랑도" },
  { section: "진흥왕의 영토 확장", q: "진흥왕이 신라의 국력을 과시하기 위해 지은 절은 무엇이며, 완공 연도는?", a: "황룡사, 569년" },
  { section: "진흥왕의 영토 확장", q: "서울 북한산 신라 진흥왕 순수비가 세워진 이유는 무엇인가?", a: "한강 유역을 차지한 후 업적을 과시하기 위해" },
  { section: "진흥왕의 영토 확장", q: "단양 신라 적성비(충북 단양)는 어느 지역을 점령한 후 무엇을 표창하기 위해 세운 것인가?", a: "고구려성이 있던 적성 지역 점령 후, 신라를 도운 지역 주민 표창" },
];

let revealed = new Set();
const TOTAL = questions.length;

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';

  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.dataset.id = item._id;
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  const shuffled = [...questions].sort(() => Math.random() - 0.5);
  buildCards(shuffled);
}

function updateProgress() {
  const count = revealed.size;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progressText').textContent = `${count} / ${TOTAL} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${TOTAL}</span>`;
}

questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
</body>
</html>
