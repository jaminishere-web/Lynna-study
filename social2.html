<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인권의 침해 및 구제 — 암기 퀴즈 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f0f5f9;
    --card-bg: #ffffff;
    --border: #d6e4ee;
    --primary: #1a6b8a;
    --primary-light: #2e9bbf;
    --accent: #d4441a;
    --text: #1a1a1a;
    --text-muted: #888;
    --answer-bg: #e6f4f9;
    --answer-text: #0d4f63;
    --tag1: #dceefb; --tag1-text: #1a4f6e;
    --tag2: #fde8e4; --tag2-text: #8b2500;
    --tag3: #e8f5e9; --tag3-text: #1b5e20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }

  header {
    background: var(--primary); color: #fff;
    padding: 26px 20px 18px; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 900; }
  header p { font-size: 0.77rem; opacity: 0.82; margin-top: 4px; }

  .stats-bar {
    background: var(--primary-light); color: #fff;
    display: flex; justify-content: center; gap: 28px;
    padding: 7px 20px; font-size: 0.82rem; font-weight: 700;
  }

  .tab-bar {
    display: flex; overflow-x: auto;
    background: #fff; border-bottom: 2px solid var(--border);
    position: sticky; top: 71px; z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 10px 16px;
    font-size: 0.79rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: none; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .controls { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
  .btn {
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px; transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: right; }

  .cards-grid { display: flex; flex-direction: column; gap: 10px; padding: 4px 14px; }

  .card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .q-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }
  .q-body { flex: 1; }
  .q-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-bottom: 5px;
  }
  .q-text { font-size: 0.9rem; font-weight: 500; line-height: 1.55; }

  .card-answer { display: none; padding: 0 14px 14px 54px; }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg); border-radius: 10px;
    padding: 10px 14px; font-size: 0.88rem; font-weight: 700;
    color: var(--answer-text); line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem; font-weight: 900; letter-spacing: 0.5px;
    color: var(--primary-light); margin-bottom: 4px; display: block;
  }

  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>

<header>
  <h1>🛡️ 인권의 침해 및 구제</h1>
  <p>Ⅰ. 인권과 헌법 2단원 — 암기 퀴즈 30문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>30</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 인권 침해</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 인권 구제 기관</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 스스로 확인</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 30 확인</div>
</div>

<div id="cardContainer"></div>
<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

<script>
const questions = [
  // ── ❶ 인권 침해의 의미와 사례 (12문제) ──
  { id:1,  tab:'1', tag:'인권 침해의 의미', q:'개인이나 단체 또는 국가 기관이 다른 사람의 인권을 침범하여 해를 입히는 행위를 무엇이라 하는가?', a:'인권 침해' },
  { id:2,  tab:'1', tag:'인권 침해의 의미', q:'오늘날 인권을 보장하기 위한 다양한 법과 제도가 마련되었지만, 일상생활에서 인권이 항상 보장되는가?', a:'아니다 (인권 침해가 여전히 발생한다)' },
  { id:3,  tab:'1', tag:'인권 침해의 원인', q:'인권 침해가 발생하는 원인 두 가지는?', a:'사람들의 고정 관념과 편견, 그 사회의 잘못된 관습이나 불합리한 법과 제도 등' },
  { id:4,  tab:'1', tag:'인권 침해 사례', q:'가정에서 노인과 아동이 무관심 속에서 방치되어 피해를 보는 것은 인권 침해인가?', a:'인권 침해이다' },
  { id:5,  tab:'1', tag:'인권 침해 사례', q:'학교에서 외모나 피부색이 다르다는 이유로 일부 학생이 따돌림을 당하는 것은 무슨 인권 침해인가?', a:'차별에 의한 인권 침해(평등권 침해)' },
  { id:6,  tab:'1', tag:'인권 침해 사례', q:'직장에서 남자 또는 여자라는 이유로, 출신 지역이나 출신 학교가 다르다는 이유로 채용과 임금 등에서 차별 대우를 받는 것은?', a:'인권 침해이다' },
  { id:7,  tab:'1', tag:'인권 침해 사례', q:'폭행이나 학대와 같은 법죄 행위로 인한 인권 침해 유형은?', a:'폭력·학대에 의한 인권 침해' },
  { id:8,  tab:'1', tag:'인권 침해 사례', q:'청각 장애를 이유로 임대를 거부하는 건물주의 행위는 무슨 권리를 침해하는가?', a:'장애를 이유로 한 차별 (평등권 침해)' },
  { id:9,  tab:'1', tag:'인권 침해 사례', q:'신입 사원 채용 시 지원 나이를 35세까지로 제한하는 것은 무슨 인권 침해인가?', a:'나이에 의한 차별(평등권 침해)' },
  { id:10, tab:'1', tag:'인권 침해 사례', q:'채용 면접에서 지방 대학 출신이라는 이유로 지원자를 무시하는 것은 무슨 인권 침해인가?', a:'출신 학교에 의한 차별(평등권 침해)' },
  { id:11, tab:'1', tag:'인권 침해 사례', q:'허락도 없이 다른 사람의 이름과 전화번호를 게시판에 공개하는 것은 어떤 권리를 침해하는가?', a:'개인 정보 자기 결정권(프라이버시권) 침해' },
  { id:12, tab:'1', tag:'인권 침해의 의미', q:'인권 침해는 일상생활과 동떨어진 것이 아니라 어떻게 나타나는가?', a:'일상생활 전반에 걸쳐 다양한 형태로 나타난다' },

  // ── ❷ 침해된 인권의 구제 기관 (13문제) ──
  { id:13, tab:'2', tag:'인권 구제 기관', q:'인권이 침해되었을 때 도움을 요청할 수 있는 국가 기관 네 가지는?', a:'국가 인권 위원회, 국민 권익 위원회, 법원, 헌법재판소' },
  { id:14, tab:'2', tag:'국가 인권 위원회', q:'국가 기관에 의해 인권을 침해당하거나 회사·단체 등에 의해 부당하게 차별당한 사람이 진정을 제기하면, 이를 조사하여 바로잡을 수 있는 국가 기관은?', a:'국가 인권 위원회' },
  { id:15, tab:'2', tag:'국가 인권 위원회', q:'진정이란 무엇인가?', a:'국가 기관에 자신의 사정을 말하고 어떤 조치를 취해 줄 것을 희망하는 일' },
  { id:16, tab:'2', tag:'국민 권익 위원회', q:'국가 기관의 잘못된 법 집행으로 피해를 본 국민이 고충 민원을 제기하면 이를 조사하여 잘못된 부분을 고치도록 조치해 주는 기관은?', a:'국민 권익 위원회' },
  { id:17, tab:'2', tag:'국민 권익 위원회', q:'행정 기관의 잘못된 처분으로 권리를 침해당한 국민이 국민 권익 위원회의 중앙 행정 심판 위원회에 제기하는 것은?', a:'행정 심판' },
  { id:18, tab:'2', tag:'국민 권익 위원회', q:'행정 심판이란 무엇인가?', a:'행정 기관의 잘못된 처분 등으로 권리나 이익을 침해받은 국민이 행정 기관에 제기하는 권리 구제 절차' },
  { id:19, tab:'2', tag:'법원', q:'국가 기관 또는 개인이나 단체에 의해 권리를 침해당한 사람이 소를 제기하면 재판을 통해 문제를 해결해 주는 기관은?', a:'법원' },
  { id:20, tab:'2', tag:'헌법재판소', q:'공권력에 의해 기본권을 침해당한 사람이 헌법 소원을 청구하면 헌법에 위배되는지 여부를 판단하여 권리를 구제해 주는 기관은?', a:'헌법재판소' },
  { id:21, tab:'2', tag:'헌법재판소', q:'공권력에 의해 기본권을 침해당한 사람이 헌법재판소에 청구할 수 있는 것은?', a:'헌법 소원' },
  { id:22, tab:'2', tag:'인권 구제 기관', q:'잘못된 언론 보도로 인권을 침해받은 경우 도움을 받을 수 있는 기관은?', a:'언론 중재 위원회' },
  { id:23, tab:'2', tag:'인권 구제 기관', q:'인권이 침해되었을 때 개인이 적극적으로 해야 할 태도는?', a:'적극적으로 문제 해결을 요구하고 국가 기관에 구제를 요청한다' },
  { id:24, tab:'2', tag:'인권 구제 기관', q:'임신을 이유로 대학원에서 교육 시설 이용을 제한당한 경우, 어떤 국가 기관에 진정서를 제출할 수 있는가?', a:'국가 인권 위원회' },
  { id:25, tab:'2', tag:'인권 구제 기관', q:'의료 광고 관련 법 조항이 헌법에 보장된 기본권을 침해한다고 주장하는 경우, 어떤 기관에 헌법 소원을 청구하는가?', a:'헌법재판소' },

  // ── ❸ 스스로 확인 (5문제) ──
  { id:26, tab:'3', tag:'스스로 확인', q:'개인이나 단체 또는 국가 기관이 다른 사람의 인권을 해치거나 방해하는 것을 인권 침해라고 한다. (O/X)', a:'O' },
  { id:27, tab:'3', tag:'스스로 확인', q:'남자 또는 여자라는 이유만으로 채용 시 불이익을 받는 것은 인권 침해에 해당한다. (O/X)', a:'O' },
  { id:28, tab:'3', tag:'스스로 확인', q:'개인이나 단체에 의해 부당하게 차별을 당한 사람은 국민 권익 위원회에 행정 심판을 제기할 수 있다. (O/X)', a:'X (개인·단체에 의한 차별은 국가 인권 위원회에 진정을 제기한다. 행정 심판은 행정 기관의 잘못된 처분에 대한 것이다.)' },
  { id:29, tab:'3', tag:'스스로 확인', q:'공권력에 의해 기본권을 침해당한 사람이 헌법재판소에 청구할 수 있는 것은?', a:'헌법 소원' },
  { id:30, tab:'3', tag:'스스로 확인', q:'인권 구제를 위한 네 가지 국가 기관과 각 기관의 주요 역할을 간단히 쓰시오.', a:'① 국가 인권 위원회: 진정 접수·조사 ② 국민 권익 위원회: 고충 민원·행정 심판 ③ 법원: 소 제기·재판 ④ 헌법재판소: 헌법 소원 심판' },
];

const TOTAL = 30;
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return { '1':'t1', '2':'t2', '3':'t3' }[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  revealedSet.has(id) ? revealedSet.delete(id) : revealedSet.add(id);
  updateStats(); renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  document.getElementById('progressFill').style.width = Math.round(count/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent = `${count} / ${TOTAL} 확인`;
}

function showTab(tab) {
  currentTab = tab;
  const tabs = ['all','1','2','3'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats(); renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats(); renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
</body>
</html>
