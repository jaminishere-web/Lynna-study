<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근로자의 권리와 노동권 침해 및 구제 — 암기 퀴즈 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f2f7f2;
    --card-bg: #ffffff;
    --border: #d3e8d3;
    --primary: #2e7d32;
    --primary-light: #4caf50;
    --accent: #e65100;
    --text: #1a1a1a;
    --text-muted: #888;
    --answer-bg: #e8f5e9;
    --answer-text: #1b5e20;
    --tag1: #e8f5e9; --tag1-text: #1b5e20;
    --tag2: #fff3e0; --tag2-text: #e65100;
    --tag3: #e3f2fd; --tag3-text: #0d47a1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }

  header {
    background: var(--primary); color: #fff;
    padding: 26px 20px 18px; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.15rem; font-weight: 900; }
  header p { font-size: 0.77rem; opacity: 0.82; margin-top: 4px; }

  .stats-bar {
    background: var(--primary-light); color: #fff;
    display: flex; justify-content: center; gap: 28px;
    padding: 7px 20px; font-size: 0.82rem; font-weight: 700;
  }

  .tab-bar {
    display: flex; overflow-x: auto;
    background: #fff; border-bottom: 2px solid var(--border);
    position: sticky; top: 71px; z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 10px 15px;
    font-size: 0.79rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: none; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .controls { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
  .btn {
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px; transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: right; }

  .cards-grid { display: flex; flex-direction: column; gap: 10px; padding: 4px 14px; }

  .card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .q-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }
  .q-body { flex: 1; }
  .q-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-bottom: 5px;
  }
  .q-text { font-size: 0.9rem; font-weight: 500; line-height: 1.55; }

  .card-answer { display: none; padding: 0 14px 14px 54px; }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg); border-radius: 10px;
    padding: 10px 14px; font-size: 0.88rem; font-weight: 700;
    color: var(--answer-text); line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem; font-weight: 900; letter-spacing: 0.5px;
    color: var(--primary-light); margin-bottom: 4px; display: block;
  }

  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>

<header>
  <h1>👷 근로자의 권리와 노동권 침해 및 구제</h1>
  <p>Ⅰ. 인권과 헌법 3단원 — 암기 퀴즈 30문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>30</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 근로자·권리</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 노동권 침해</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 구제 방법</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 30 확인</div>
</div>

<div id="cardContainer"></div>
<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

<script>
const questions = [
  // ── ❶ 근로자의 의미와 권리 (13문제) ──
  { id:1,  tab:'1', tag:'근로자의 의미', q:'사용자에게 노동을 제공하고 임금을 받는 사람을 무엇이라 하는가?', a:'근로자' },
  { id:2,  tab:'1', tag:'근로자의 의미', q:'사용자란 누구인가?', a:'근로자를 채용하거나 해고하고, 근로에 대해 지휘·감독할 책임을 지는 사람' },
  { id:3,  tab:'1', tag:'근로자의 의미', q:'근로자는 직업의 종류와 근로 기간에 상관없이 사용자에게 임금을 받고 일하는 모든 사람을 뜻한다. 국가 기관에서 일하는 공무원도 근로자에 포함되는가?', a:'포함된다' },
  { id:4,  tab:'1', tag:'근로의 권리', q:'일할 의사와 능력을 가진 사람이 일할 기회와 인간다운 생활의 보장을 요구할 권리는?', a:'근로의 권리' },
  { id:5,  tab:'1', tag:'근로의 권리', q:'우리 헌법 제32조 ①항의 내용은?', a:'모든 국민은 근로의 권리를 가진다' },
  { id:6,  tab:'1', tag:'노동 삼권', q:'헌법이 보장하는 노동 삼권 세 가지는?', a:'단결권, 단체 교섭권, 단체 행동권' },
  { id:7,  tab:'1', tag:'노동 삼권', q:'근로자들이 노동조합을 만들고 그에 가입하여 활동할 수 있는 권리는?', a:'단결권' },
  { id:8,  tab:'1', tag:'노동 삼권', q:'노동조합을 통해 근로 조건에 관하여 사용자와 협상할 수 있는 권리는?', a:'단체 교섭권' },
  { id:9,  tab:'1', tag:'노동 삼권', q:'단체 교섭이 원만하게 이루어지지 않을 경우 파업, 태업 등 쟁의 행위를 할 수 있는 권리는?', a:'단체 행동권' },
  { id:10, tab:'1', tag:'노동 삼권', q:'노동조합이란 무엇인가?', a:'근로 조건의 개선과 근로자의 지위 향상 등을 목적으로 근로자들이 조직한 단체' },
  { id:11, tab:'1', tag:'법으로 보장된 근로 조건', q:'근로 시간은 원칙적으로 휴식 시간을 제외하고 1일 몇 시간, 1주 몇 시간을 초과할 수 없는가?', a:'1일 8시간, 1주 40시간' },
  { id:12, tab:'1', tag:'법으로 보장된 근로 조건', q:'근로 시간이 4시간이면 몇 분 이상, 8시간이면 몇 시간 이상의 휴식 시간을 일하는 도중에 주어야 하는가?', a:'4시간: 30분 이상 / 8시간: 1시간 이상' },
  { id:13, tab:'1', tag:'법으로 보장된 근로 조건', q:'원칙적으로 근로자를 해고하려면 적어도 며칠 전에 알려 주어야 하며, 정당한 이유 없이 해고할 수 있는가?', a:'30일 전에 알려 주어야 하며, 정당한 이유 없이 해고할 수 없다' },

  // ── ❷ 노동권 침해 사례 (9문제) ──
  { id:14, tab:'2', tag:'노동권 침해 사례', q:'임금을 제때에 모두 받지 못하거나 최저 임금 미만으로 받는 것은 노동권 침해인가?', a:'노동권 침해이다' },
  { id:15, tab:'2', tag:'노동권 침해 사례', q:'최저 임금 제도란 무엇인가?', a:'국가가 근로자의 생활 안정을 위해 임금의 최저 수준을 정하고 사용자에게 그 수준 이상의 임금을 지급하도록 법으로 강제하는 제도' },
  { id:16, tab:'2', tag:'노동권 침해 사례', q:'근로 계약서를 작성하지 않는 것은 노동권 침해에 해당하는가?', a:'노동권 침해이다' },
  { id:17, tab:'2', tag:'노동권 침해 사례', q:'근로자와 합의 없이 1일 8시간, 1주 40시간을 초과하여 일을 시키는 것은?', a:'노동권 침해이다' },
  { id:18, tab:'2', tag:'노동권 침해 사례', q:'일하는 도중에 휴식 시간을 주지 않는 것은 노동권 침해인가?', a:'노동권 침해이다' },
  { id:19, tab:'2', tag:'부당 해고·부당 노동 행위', q:'결혼 또는 출산을 이유로 퇴직을 강요하거나 정당한 이유 없이 해고하는 것을 무엇이라 하는가?', a:'부당 해고' },
  { id:20, tab:'2', tag:'부당 해고·부당 노동 행위', q:'사용자가 노동조합의 결성 또는 가입을 방해하거나 정당한 이유 없이 단체 교섭을 거부하는 것을 무엇이라 하는가?', a:'부당 노동 행위' },
  { id:21, tab:'2', tag:'노동권 침해 사례', q:'월급날 임금의 절반만 지급하는 것은 노동권 침해인가?', a:'노동권 침해이다 (임금은 전액을 지급해야 함)' },
  { id:22, tab:'2', tag:'노동권 침해 사례', q:'근로 계약에 따라 정해진 근로 시간(9시~18시) 동안 일하고 1시간의 휴식을 받았다면, 이는 노동권 침해인가?', a:'노동권 침해가 아니다 (8시간 근로에 1시간 휴식은 적법)' },

  // ── ❸ 침해된 노동권 구제 방법 (8문제) ──
  { id:23, tab:'3', tag:'노동권 구제 방법', q:'임금을 제때 받지 못했을 때 신고할 수 있는 국가 기관은?', a:'고용 노동부' },
  { id:24, tab:'3', tag:'노동권 구제 방법', q:'임금을 제때 받지 못했을 때 고용 노동부에 신고하는 것 외에 또 도움을 요청할 수 있는 기관은?', a:'법원' },
  { id:25, tab:'3', tag:'노동권 구제 방법', q:'부당 해고를 당하거나 부당 노동 행위로 노동 삼권을 침해받았을 때 구제를 요청할 수 있는 기관은?', a:'노동 위원회' },
  { id:26, tab:'3', tag:'노동권 구제 방법', q:'노동 위원회의 결정에 불복할 경우 어떻게 할 수 있는가?', a:'법원에 소를 제기할 수 있다' },
  { id:27, tab:'3', tag:'노동권 구제 절차', q:'부당 해고·부당 노동 행위에 대한 노동 위원회 구제 절차를 순서대로 쓰시오.', a:'피해 당사자 → (3개월 이내 구제 신청) → 지방 노동 위원회 → (불복 시 재심 신청) → 중앙 노동 위원회 → (불복 시 행정 소송 제기) → 법원' },
  { id:28, tab:'3', tag:'노동권 구제 방법', q:'노동권 침해가 있기 전에 가장 바람직한 예방책은 무엇인가?', a:'사용자가 근로자의 노동권을 침해하지 않도록 노력하고, 노동조합과 사용자가 서로 존중하며 원만한 노사 관계를 형성하는 것' },
  { id:29, tab:'3', tag:'스스로 확인', q:'우리 헌법은 근로자의 권리와 이익 향상을 위해 근로의 권리를 보장하고 있다. (O/X)', a:'O' },
  { id:30, tab:'3', tag:'스스로 확인', q:'임금을 제때 받지 못하는 것은 노동권 침해 사례에 해당하지 않는다. (O/X)', a:'X (노동권 침해에 해당한다)' },
];

const TOTAL = 30;
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return { '1':'t1', '2':'t2', '3':'t3' }[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  revealedSet.has(id) ? revealedSet.delete(id) : revealedSet.add(id);
  updateStats(); renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  document.getElementById('progressFill').style.width = Math.round(count/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent = `${count} / ${TOTAL} 확인`;
}

function showTab(tab) {
  currentTab = tab;
  const tabs = ['all','1','2','3'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats(); renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats(); renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
</body>
</html>
