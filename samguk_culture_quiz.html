<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼국의 문화와 대외 교류 단답형 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #4A2D6B;
    --purple-light: #7050A0;
    --purple-dark: #2D1A45;
    --cream: #F6F3FA;
    --dark: #15101E;
    --muted: #5E506A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #EDE8F5;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(74,45,107,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(45,26,69,0.08) 0%, transparent 50%);
    color: #15101E;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .header::before {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--purple-light), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--purple-dark);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 900;
    color: #15101E;
    line-height: 1.25;
    margin-bottom: 8px;
  }

  h1 span { color: var(--purple-dark); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple-dark), transparent);
    margin: 24px auto 0;
  }

  /* 연표 */
  .timeline {
    max-width: 900px;
    margin: 0 auto 48px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
  }

  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 22px;
    position: relative;
  }

  .tl-item:not(:last-child)::after {
    content: '▶';
    position: absolute;
    right: -8px;
    top: 8px;
    font-size: 10px;
    color: var(--purple-light);
  }

  .tl-year {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--purple-dark);
    margin-bottom: 4px;
  }

  .tl-event {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary {
    background: var(--purple-dark);
    color: #F6F3FA;
  }

  .btn-primary:hover {
    background: var(--purple);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(74,45,107,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: var(--purple-dark);
    border: 1px solid var(--purple);
  }

  .btn-secondary:hover {
    background: rgba(74,45,107,0.07);
    color: #15101E;
  }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: rgba(74,45,107,0.12);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple-dark), var(--purple-light));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: #FFFFFF;
    border: 1px solid rgba(74,45,107,0.18);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--purple-dark);
    transition: background 0.3s;
  }

  .question-card:hover {
    background: #FAF7FD;
    border-color: rgba(74,45,107,0.35);
  }

  .question-card.revealed {
    background: #F4EFF9;
    border-color: rgba(74,45,107,0.35);
  }

  .question-card.revealed::before { background: var(--purple-light); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--purple-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: #15101E;
    flex: 1;
  }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show {
    max-height: 220px;
    opacity: 1;
  }

  .answer-box {
    background: rgba(74,45,107,0.07);
    border-left: 2px solid var(--purple-light);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--purple-dark);
    font-weight: 600;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #15101E;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: #9080AA;
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--purple-dark);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .section-divider::before {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple-light));
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--purple-light), transparent);
  }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: #FFFFFF;
    border: 1px solid rgba(74,45,107,0.18);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--muted);
  }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--purple-dark);
    line-height: 1;
  }

  .score-number span {
    font-size: 16px;
    color: var(--muted);
    font-weight: 400;
  }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap, .reveal-hint { margin-left: 20px; }
    .tl-item { padding: 0 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 삼국의 문화와 대외 교류</div>
  <h1>삼국에서 다양한<br><span>문화가 발전하다</span></h1>
  <p class="subtitle">단답형 40문제 · 클릭하여 정답 확인</p>
</div>

<div class="timeline">
  <div class="tl-item"><div class="tl-year">372</div><div class="tl-event">고구려 불교 수용</div></div>
  <div class="tl-item"><div class="tl-year">384</div><div class="tl-event">백제 불교 수용</div></div>
  <div class="tl-item"><div class="tl-year">527</div><div class="tl-event">신라 불교 공인</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 40 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 40</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [

  // ─── 불교 수용 목적 ───
  { section: "불교 수용과 예술의 발전", q: "삼국이 불교를 받아들인 두 가지 정치적 목적은 무엇인가?", a: "지방 세력 포용, 백성의 사상 통합" },
  { section: "불교 수용과 예술의 발전", q: "삼국에서 불교가 왕실로부터 시작하여 어디까지 전해졌는가?", a: "점차 백성에게 전해졌다" },
  { section: "불교 수용과 예술의 발전", q: "고구려가 불교를 수용한 연도는?", a: "372년" },
  { section: "불교 수용과 예술의 발전", q: "백제가 불교를 수용한 연도는?", a: "384년" },
  { section: "불교 수용과 예술의 발전", q: "신라가 불교를 공인한 연도는?", a: "527년(법흥왕)" },

  // ─── 삼국의 탑 ───
  { section: "삼국의 탑과 사찰", q: "신라 진흥왕 때 세운 대표적인 사찰 두 곳을 쓰시오.", a: "황룡사, 미륵사(백제 무왕)" },
  { section: "삼국의 탑과 사찰", q: "삼국 초기에 주로 만든 탑의 재료는 무엇이며, 이후 어떤 재료로 바뀌었는가?", a: "처음엔 목탑 → 점차 석탑으로 변화" },
  { section: "삼국의 탑과 사찰", q: "고구려의 탑이 현재 남아 있지 않은 이유와 관련된 재료는 무엇인가?", a: "목탑이었기 때문(남아 있는 것이 없음)" },
  { section: "삼국의 탑과 사찰", q: "백제의 탑 중 현재 남아 있는 두 가지를 쓰시오.", a: "익산 미륵사지 석탑, 부여 정림사지 5층 석탑" },
  { section: "삼국의 탑과 사찰", q: "신라 황룡사 9층 목탑은 현재 어떤 상태인가?", a: "불에 타 남아 있지 않음(모형만 존재)" },
  { section: "삼국의 탑과 사찰", q: "경주 분황사 모전 석탑의 특징은 무엇이며, 원래 몇 층으로 추정되는가?", a: "돌을 벽돌 모양으로 다듬어 쌓음 / 원래 7층이나 9층 추정, 현재 3층 남음" },
  { section: "삼국의 탑과 사찰", q: "부여 정림사지 5층 석탑의 높이는 약 몇 m인가?", a: "약 8.3m" },

  // ─── 삼국의 불상 ───
  { section: "삼국의 불상", q: "고구려 불상의 대표 작품과 그 특징을 쓰시오.", a: "금동 연가 7년명 여래 입상 — 중국 북위의 불상 양식과 비슷함" },
  { section: "삼국의 불상", q: "'백제의 미소'라고 불리는 백제의 대표 불상은 무엇인가?", a: "서산 용현리 마애 여래 삼존상" },
  { section: "삼국의 불상", q: "서산 용현리 마애 여래 삼존상은 어디에 조각되었는가?", a: "바위에 조각된 불상(충남 서산)" },
  { section: "삼국의 불상", q: "신라 경주 배동 석조 여래 삼존 입상의 특징은 무엇인가?", a: "어린아이 같은 표정으로 부처의 자비로움을 표현" },
  { section: "삼국의 불상", q: "삼국 시대에 미륵 신앙의 유행으로 많이 만들어진 불상은 무엇인가?", a: "미륵보살 반가 사유상" },

  // ─── 도교의 수용 ───
  { section: "도교의 수용", q: "삼국 시대에 중국에서 전래된 도교의 핵심 사상은 무엇인가?", a: "산천 숭배와 불로장생을 추구하는 신선 사상" },
  { section: "도교의 수용", q: "도교의 영향이 나타나는 고구려 고분 유물은 무엇인가?", a: "고구려 고분의 사신도(동서남북을 지키는 방위신)" },
  { section: "도교의 수용", q: "백제에서 도교 사상을 확인할 수 있는 두 가지 유물은?", a: "백제의 산수무늬 벽돌, 백제 금동 대향로" },
  { section: "도교의 수용", q: "백제 산수무늬 벽돌에 담긴 내용은 무엇인가?", a: "산과 나무, 구름 등 자연과 더불어 살려는 이상" },

  // ─── 학문과 역사서 ───
  { section: "학문과 역사서", q: "삼국 시대에 한자와 함께 전래되어 학문이 발달하게 한 사상은 무엇인가?", a: "유학(유교)" },
  { section: "학문과 역사서", q: "고구려에서 유교 경전과 역사를 가르친 교육 기관은 무엇인가?", a: "태학" },
  { section: "학문과 역사서", q: "백제에서 유교 경전을 가르친 박사는 누구인가?", a: "오경박사" },
  { section: "학문과 역사서", q: "백제에서 기술학을 가르친 두 박사는 누구인가?", a: "의박사(의학), 역박사(천문·역법)" },
  { section: "학문과 역사서", q: "신라에서 젊은이들이 유교 경전을 공부하였음을 알 수 있는 유물은 무엇인가?", a: "임신서기석" },
  { section: "학문과 역사서", q: "고구려가 초기에 지은 역사서이며, 영양왕 때 이문진이 간추린 역사서의 이름은?", a: "유기(→간추려 『신집』 5권)" },
  { section: "학문과 역사서", q: "백제의 역사서는 어느 왕 때 편찬되었으며, 이름은 무엇인가?", a: "근초고왕 때, 『서기』" },
  { section: "학문과 역사서", q: "신라의 역사서는 어느 왕 때 편찬되었으며, 이름은 무엇인가?", a: "진흥왕 때, 『국사』" },

  // ─── 과학 기술 ───
  { section: "과학·기술의 발달", q: "삼국 시대에 천문학이 발달한 두 가지 이유는 무엇인가?", a: "천체 현상이 왕의 권위와 연결됨 / 농업을 위한 천체 관측이 중요함" },
  { section: "과학·기술의 발달", q: "고구려가 별자리를 그린 장소는 어디인가?", a: "고분 속(고분 천장)" },
  { section: "과학·기술의 발달", q: "신라가 만든 천문 관측 시설은 무엇이며, 위치는 어디인가?", a: "첨성대, 경주(경북 경주)" },
  { section: "과학·기술의 발달", q: "경주 첨성대가 건립된 시기는 언제로 추정되는가?", a: "7세기" },
  { section: "과학·기술의 발달", q: "삼국에서 수학 지식을 활용하여 만든 것 세 가지를 쓰시오.", a: "토지 측량, 고분, 탑" },
  { section: "과학·기술의 발달", q: "당시 높은 수준의 금속 공예 기술을 보여 주는 백제 유물 두 가지를 쓰시오.", a: "백제 칠지도, 백제 금동 대향로" },

  // ─── 신라의 황금 문화 ───
  { section: "신라의 황금 문화", q: "신라 황금 문화의 전성기는 언제인가?", a: "5세기에서 6세기 전반" },
  { section: "신라의 황금 문화", q: "신라 지배층의 무덤에서 발견된 황금 유물 네 가지를 쓰시오.", a: "금관, 금목걸이, 금귀걸이, 금제 허리띠" },
  { section: "신라의 황금 문화", q: "황남 대총 북분 금관의 특징 두 가지를 쓰시오.", a: "나뭇가지 모양 장식, 금·은옥을 매달아 장식" },

  // ─── 익산 미륵사지 석탑 ───
  { section: "익산 미륵사지 석탑", q: "익산 미륵사지 석탑을 지은 왕은 누구인가?", a: "백제 무왕" },
  { section: "익산 미륵사지 석탑", q: "익산 미륵사지 석탑은 재료가 석탑이지만 어떤 양식을 따라 지었는가?", a: "목탑 양식" },
  { section: "익산 미륵사지 석탑", q: "익산 미륵사지 석탑의 두 가지 기록상 특징을 쓰시오.", a: "우리나라에서 가장 크고, 제작 시기가 가장 오래됨" },
  { section: "익산 미륵사지 석탑", q: "익산 미륵사지 석탑 복원 시 사용된 첨단 기술은 무엇인가?", a: "3D 스캐닝 기술" },
  { section: "익산 미륵사지 석탑", q: "익산 미륵사지 석탑 해체 과정에서 발견된 유물은 무엇이며, 그 안의 기록이 중요한 이유는?", a: "금제 사리 봉안기 — 미륵사 창건 주도자에 대해 『삼국유사』 기록과 다른 사실이 적혀 있기 때문" },
  { section: "익산 미륵사지 석탑", q: "금제 사리 봉안기에 따르면 미륵사를 창건한 사람은 누구인가?", a: "무왕 40년(639)에 왕비(백제의 좌평인 사택적덕의 딸)" },
  { section: "익산 미륵사지 석탑", q: "복원된 익산 미륵사지 석탑은 몇 층까지 복원되었는가?", a: "6층" },

  // ─── 백제 금동 대향로 ───
  { section: "백제 금동 대향로", q: "백제 금동 대향로의 높이는 약 몇 cm인가?", a: "약 61.8cm" },
  { section: "백제 금동 대향로", q: "백제 금동 대향로의 향로에 반영된 두 가지 사상은 무엇인가?", a: "도교(봉황·산천·신선 세계), 불교(연꽃)" },
  { section: "백제 금동 대향로", q: "백제 금동 대향로가 현재 소장된 곳은 어디인가?", a: "국립 부여 박물관" },
];

let revealed = new Set();
const TOTAL = questions.length;

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';

  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.dataset.id = item._id;
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  const shuffled = [...questions].sort(() => Math.random() - 0.5);
  buildCards(shuffled);
}

function updateProgress() {
  const count = revealed.size;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progressText').textContent = `${count} / ${TOTAL} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${TOTAL}</span>`;
}

questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
