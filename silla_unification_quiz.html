<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신라가 삼국을 통일하다 단답형 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #4A6B3A;
    --accent-light: #6E9E58;
    --accent-dark: #2C4220;
    --bg: #E8EDE4;
    --card-bg: #FFFFFF;
    --card-hover: #F5F8F3;
    --card-revealed: #EDF3E8;
    --text-primary: #141A10;
    --text-muted: #4A5E40;
    --border: rgba(74,107,58,0.18);
    --border-hover: rgba(74,107,58,0.38);
    --answer-bg: rgba(74,107,58,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(74,107,58,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(44,66,32,0.08) 0%, transparent 50%);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header { text-align: center; margin-bottom: 56px; }

  .header::before {
    content: '';
    display: block;
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent-dark);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(24px, 5vw, 44px);
    font-weight: 900;
    color: #141A10;
    line-height: 1.25;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent-dark); }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dark), transparent);
    margin: 24px auto 0;
  }

  .timeline {
    max-width: 900px;
    margin: 0 auto 48px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
  }

  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 18px;
    position: relative;
  }

  .tl-item:not(:last-child)::after {
    content: '▶';
    position: absolute;
    right: -8px; top: 8px;
    font-size: 10px;
    color: var(--accent-light);
  }

  .tl-year {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-dark);
    margin-bottom: 4px;
  }

  .tl-event {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary {
    background: var(--accent-dark);
    color: #FFFFFF;
  }

  .btn-primary:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(74,107,58,0.3);
  }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--accent-dark);
    border: 1px solid var(--accent);
  }

  .btn-secondary:hover {
    background: var(--card-hover);
    color: #141A10;
  }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: rgba(74,107,58,0.12);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dark), var(--accent-light));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-dark);
    transition: background 0.3s;
  }

  .question-card:hover { background: var(--card-hover); border-color: var(--border-hover); }
  .question-card.revealed { background: var(--card-revealed); border-color: var(--border-hover); }
  .question-card.revealed::before { background: var(--accent-light); }

  .card-header { display: flex; align-items: flex-start; gap: 20px; }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--accent-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
    font-weight: 700;
  }

  .q-text { font-size: 15px; line-height: 1.7; color: #141A10; flex: 1; }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show { max-height: 240px; opacity: 1; }

  .answer-box {
    background: var(--answer-bg);
    border-left: 2px solid var(--accent-light);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent-dark);
    font-weight: 700;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #141A10;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--accent-dark);
    letter-spacing: 2px;
    white-space: nowrap;
    font-weight: 700;
  }

  .section-divider::before { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-light)); }
  .section-divider::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent-light), transparent); }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text { font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--text-muted); }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--accent-dark);
    line-height: 1;
  }

  .score-number span { font-size: 16px; color: var(--text-muted); font-weight: 400; }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap, .reveal-hint { margin-left: 20px; }
    .tl-item { padding: 0 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 남북국 시대의 전개</div>
  <h1>신라가<br><span>삼국을 통일하다</span></h1>
  <p class="subtitle">단답형 30문제 · 클릭하여 정답 확인</p>
</div>

<div class="timeline">
  <div class="tl-item"><div class="tl-year">648</div><div class="tl-event">나당 동맹 체결</div></div>
  <div class="tl-item"><div class="tl-year">660</div><div class="tl-event">백제 멸망</div></div>
  <div class="tl-item"><div class="tl-year">668</div><div class="tl-event">고구려 멸망</div></div>
  <div class="tl-item"><div class="tl-year">676</div><div class="tl-event">삼국 통일</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 30 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 30</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [

  // ─── 신라와 당의 동맹 ───
  { section: "신라와 당의 동맹", q: "642년 백제 의자왕의 공격으로 신라가 빼앗긴 군사 요충지는 어디인가?", a: "대야성을 비롯한 40여 개의 성" },
  { section: "신라와 당의 동맹", q: "위기에 처한 신라가 고구려에 도움을 요청하기 위해 보낸 인물은 누구인가?", a: "김춘추" },
  { section: "신라와 당의 동맹", q: "고구려가 신라의 도움 요청을 거절한 이유(협상 조건)는 무엇인가?", a: "신라가 점령한 옛 고구려 영토를 돌려줄 것을 요구" },
  { section: "신라와 당의 동맹", q: "김춘추가 왜에 협조를 구했지만 실패한 후 동맹을 맺기 위해 찾아간 나라는 어디인가?", a: "당" },
  { section: "신라와 당의 동맹", q: "나당 동맹이 체결된 연도와 핵심 내용은 무엇인가?", a: "648년 — 신라가 당의 군사를 지원받는 대가로 당의 고구려 공격에 협조" },
  { section: "신라와 당의 동맹", q: "나당 동맹 체결 당시 당 태종이 신라에 제시한 조건은 무엇인가?", a: "고구려와 백제를 멸망시키면 대동강 이남의 영토를 신라에게 줌" },

  // ─── 백제의 멸망 ───
  { section: "백제의 멸망", q: "나당 연합군이 백제를 공격하기 전 백제 내부 상황은 어떠하였는가?", a: "의자왕이 집권 초기 왕권 강화 개혁을 추진하자 귀족 세력이 반발하여 지배층이 분열됨" },
  { section: "백제의 멸망", q: "나당 연합군의 백제 공격 시 소정방이 이끄는 당군이 상륙한 곳은 어디인가?", a: "금강 하구" },
  { section: "백제의 멸망", q: "황산벌 전투에서 김유신이 이끄는 신라군과 맞선 백제의 장군은 누구인가?", a: "계백" },
  { section: "백제의 멸망", q: "계백이 이끈 결사대의 군사 수와 신라군의 수는 각각 얼마인가?", a: "계백: 5천 명, 김유신: 5만 명" },
  { section: "백제의 멸망", q: "황산벌 전투에서 신라군의 사기를 높여 결국 백제군을 패배시킨 결정적 사건은 무엇인가?", a: "관창 등 젊은 화랑의 희생으로 신라군 사기 고양, 총공격으로 백제군 패배" },
  { section: "백제의 멸망", q: "나당 연합군이 사비성을 함락하고 의자왕의 항복을 받은 연도는?", a: "660년" },

  // ─── 고구려의 멸망 ───
  { section: "고구려의 멸망", q: "백제 멸망 후에도 고구려가 한동안 신라와 당의 공격을 막을 수 있었던 이유는 무엇인가?", a: "연개소문을 중심으로 결사 항전" },
  { section: "고구려의 멸망", q: "연개소문 사후 고구려의 정치 상황은 어떻게 변화하였는가?", a: "아들들이 권력을 다투어 정치가 혼란해짐" },
  { section: "고구려의 멸망", q: "나당 연합군이 고구려를 멸망시킨 연도와 함락한 도시는 어디인가?", a: "668년, 평양성" },

  // ─── 백제·고구려의 부흥 운동 ───
  { section: "백제·고구려의 부흥 운동", q: "백제 부흥 운동을 일으킨 두 인물과 그들의 거점을 쓰시오.", a: "복신·도침: 주류성 / 흑치상지: 임존성" },
  { section: "백제·고구려의 부흥 운동", q: "백제 부흥 운동 세력이 왕으로 맞이한 인물은 누구인가?", a: "(부여)풍 — 왜에 있던 백제 왕자" },
  { section: "백제·고구려의 부흥 운동", q: "백제 부흥군과 왜 연합군이 663년 나당 연합군에게 패배한 전투는 무엇인가?", a: "백강 전투(백강 하구)" },
  { section: "백제·고구려의 부흥 운동", q: "백강 전투 이후 많은 백제 유민이 망명한 나라는 어디인가?", a: "일본" },
  { section: "백제·고구려의 부흥 운동", q: "고구려 부흥 운동 당시 보장왕의 아들 안승을 왕으로 받들어 한성에서 부흥 운동을 벌인 인물은?", a: "검모잠" },
  { section: "백제·고구려의 부흥 운동", q: "고구려 부흥 운동이 실패한 원인은 무엇인가?", a: "지도층이 분열하여 안승이 검모잠을 죽이고 신라에 망명함" },

  // ─── 나당 전쟁과 삼국 통일 ───
  { section: "나당 전쟁과 삼국 통일", q: "백제와 고구려 멸망 후 당이 한반도를 지배하려 설치하려 한 두 개의 도호부는 무엇인가?", a: "웅진 도독부(백제 땅), 안동 도호부(고구려 땅)" },
  { section: "나당 전쟁과 삼국 통일", q: "당이 신라 금성에 설치하려 한 기구의 이름은 무엇인가?", a: "계림 도독부" },
  { section: "나당 전쟁과 삼국 통일", q: "신라가 나당 전쟁에서 고구려 유민을 포섭하기 위해 안승을 어떤 지위에 임명하였는가?", a: "보덕국의 왕" },
  { section: "나당 전쟁과 삼국 통일", q: "675년 신라가 당의 군대를 물리친 전투는 무엇인가?", a: "매소성 전투" },
  { section: "나당 전쟁과 삼국 통일", q: "676년 신라가 당의 수군을 격파하여 삼국 통일의 결정타를 날린 전투는 무엇인가?", a: "기벌포 전투" },
  { section: "나당 전쟁과 삼국 통일", q: "삼국 통일이 이루어진 연도는 언제이며, 신라가 확보한 영역은 어디까지인가?", a: "676년, 대동강 이남 지역" },

  // ─── 삼국 통일의 의의와 한계 ───
  { section: "삼국 통일의 의의와 한계", q: "신라의 삼국 통일이 지니는 역사적 의의 두 가지를 쓰시오.", a: "① 우리 민족 최초의 통일 ② 삼국 문화가 융합되어 새로운 민족 문화 발전의 토대가 됨" },
  { section: "삼국 통일의 의의와 한계", q: "신라의 삼국 통일 과정에서 지적되는 한계 두 가지를 쓰시오.", a: "① 당의 세력을 끌어들임 ② 고구려 영토였던 요동과 만주 지역을 잃음" },
  { section: "삼국 통일의 의의와 한계", q: "신라가 삼국 통일의 외세 침략을 물리쳤다는 점에서 인정받는 사실은 무엇인가?", a: "당이 한반도 전체를 지배하려 하자 고구려·백제 유민과 힘을 합쳐 당의 침략을 물리침" },
];

let revealed = new Set();
const TOTAL = questions.length;

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';
  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }
    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  buildCards([...questions].sort(() => Math.random() - 0.5));
}

function updateProgress() {
  const count = revealed.size;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progressText').textContent = `${count} / ${TOTAL} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${TOTAL}</span>`;
}

questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
</body>
</html>
