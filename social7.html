<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제생활과 경제 문제 — 암기 퀴즈 60</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Serif+Display&display=swap');

  :root {
    --bg: #f5f3ee;
    --card-bg: #ffffff;
    --border: #e2ddd6;
    --primary: #2d6a4f;
    --primary-light: #52b788;
    --accent: #e76f51;
    --accent2: #f4a261;
    --text: #1a1a1a;
    --text-muted: #777;
    --answer-bg: #eaf4ee;
    --answer-text: #1b5e38;
    --tag1: #d4edda;
    --tag1-text: #155724;
    --tag2: #cce5ff;
    --tag2-text: #004085;
    --tag3: #fff3cd;
    --tag3-text: #856404;
    --tag4: #f8d7da;
    --tag4-text: #721c24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  header {
    background: var(--primary);
    color: #fff;
    padding: 28px 20px 22px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header h1 {
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 0.78rem;
    opacity: 0.82;
    margin-top: 4px;
  }

  .stats-bar {
    background: var(--primary-light);
    color: #fff;
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 8px 20px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .tab-bar {
    display: flex;
    overflow-x: auto;
    gap: 0;
    background: #fff;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 75px;
    z-index: 99;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none;
    padding: 10px 16px;
    font-size: 0.8rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  .controls {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-outline {
    background: #fff;
    border: 1.5px solid var(--primary);
    color: var(--primary);
  }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-accent {
    background: var(--accent);
    color: #fff;
  }
  .btn-accent:hover { background: #d4592f; }

  .progress-wrap {
    padding: 0 16px 10px;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-light), var(--primary));
    border-radius: 99px;
    transition: width 0.4s;
    width: 0%;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 18px 16px 8px;
  }

  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 14px;
  }

  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); border-color: var(--primary-light); }
  .card.revealed { border-color: var(--primary); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 14px 14px 14px;
  }
  .q-num {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card.revealed .q-num { background: var(--primary-light); }

  .q-body { flex: 1; }
  .q-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    margin-bottom: 5px;
  }
  .q-text {
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.5;
  }

  .card-answer {
    display: none;
    padding: 0 14px 14px 54px;
  }
  .card.revealed .card-answer { display: block; }
  .answer-inner {
    background: var(--answer-bg);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--answer-text);
    line-height: 1.55;
  }
  .answer-inner .label {
    font-size: 0.68rem;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: var(--primary-light);
    margin-bottom: 4px;
    display: block;
  }

  .hidden-section { display: none; }
  .visible-section { display: block; }

  /* Tag colors */
  .t1 { background: var(--tag1); color: var(--tag1-text); }
  .t2 { background: var(--tag2); color: var(--tag2-text); }
  .t3 { background: var(--tag3); color: var(--tag3-text); }
  .t4 { background: var(--tag4); color: var(--tag4-text); }

  .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.9rem; }

  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<header>
  <h1>📘 경제생활과 경제 문제</h1>
  <p>Ⅲ. 경제생활과 선택 — 암기 퀴즈 60문제</p>
</header>
<div class="stats-bar">
  <span>전체 <strong>60</strong>문제</span>
  <span>확인 <strong id="revealCount">0</strong>문제</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('all')">전체</button>
  <button class="tab-btn" onclick="showTab('1')">❶ 경제 활동</button>
  <button class="tab-btn" onclick="showTab('2')">❷ 희소성·선택</button>
  <button class="tab-btn" onclick="showTab('3')">❸ 경제 체제</button>
</div>

<div class="controls">
  <button class="btn btn-outline" onclick="revealAll()">전체 답 보기</button>
  <button class="btn btn-outline" onclick="hideAll()">전체 답 숨기기</button>
  <button class="btn btn-accent" onclick="shuffle()">🔀 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 60 확인</div>
</div>

<div id="cardContainer"></div>

<footer>클릭하면 답이 보이고, 다시 클릭하면 숨겨집니다.</footer>

];

const tabColors = { '1':'t1', '2':'t2', '3':'t3', '4':'t4' };
let currentTab = 'all';
let revealedSet = new Set();
let orderedQuestions = [...questions];

function tagColor(tab) {
  return tabColors[tab] || 't1';
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">해당 탭에 문제가 없습니다.</div>';
    return;
  }

  container.innerHTML = `<div class="cards-grid">${
    filtered.map((q, idx) => {
      const isRevealed = revealedSet.has(q.id);
      return `
        <div class="card ${isRevealed ? 'revealed' : ''}" id="card-${q.id}" onclick="toggleCard(${q.id})">
          <div class="card-header">
            <div class="q-num">${idx+1}</div>
            <div class="q-body">
              <span class="q-tag ${tagColor(q.tab)}">${q.tag}</span>
              <div class="q-text">${q.q}</div>
            </div>
          </div>
          <div class="card-answer">
            <div class="answer-inner">
              <span class="label">▶ 정답</span>
              ${q.a}
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

function toggleCard(id) {
  if (revealedSet.has(id)) {
    revealedSet.delete(id);
  } else {
    revealedSet.add(id);
  }
  updateStats();
  renderCards();
}

function updateStats() {
  const count = revealedSet.size;
  document.getElementById('revealCount').textContent = count;
  const pct = Math.round(count / 60 * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${count} / 60 확인`;
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['all','1','2','3'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  renderCards();
}

function revealAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.add(q.id));
  updateStats();
  renderCards();
}

function hideAll() {
  const filtered = currentTab === 'all' ? orderedQuestions : orderedQuestions.filter(q => q.tab === currentTab);
  filtered.forEach(q => revealedSet.delete(q.id));
  updateStats();
  renderCards();
}

function shuffle() {
  for (let i = orderedQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [orderedQuestions[i], orderedQuestions[j]] = [orderedQuestions[j], orderedQuestions[i]];
  }
  renderCards();
}

renderCards();
updateStats();
</script>
