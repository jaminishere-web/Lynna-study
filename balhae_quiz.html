<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발해를 건국하여 고구려를 계승하다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #3A5C7A;
    --accent-light: #5A8EAD;
    --accent-dark: #1E3A50;
    --bg: #E4EAF0;
    --card-bg: #FFFFFF;
    --card-hover: #F3F7FA;
    --card-revealed: #EAF2F8;
    --text-primary: #101820;
    --text-muted: #405060;
    --border: rgba(58,92,122,0.18);
    --border-hover: rgba(58,92,122,0.38);
    --answer-bg: rgba(58,92,122,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(58,92,122,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(30,58,80,0.08) 0%, transparent 50%);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .header { text-align: center; margin-bottom: 56px; }

  .header::before {
    content: '';
    display: block;
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
    margin: 0 auto 24px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent-dark);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(24px, 5vw, 44px);
    font-weight: 900;
    color: #101820;
    line-height: 1.25;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent-dark); }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dark), transparent);
    margin: 24px auto 0;
  }

  .timeline {
    max-width: 900px;
    margin: 0 auto 48px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
  }

  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    position: relative;
  }

  .tl-item:not(:last-child)::after {
    content: '▶';
    position: absolute;
    right: -8px; top: 8px;
    font-size: 10px;
    color: var(--accent-light);
  }

  .tl-year {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-dark);
    margin-bottom: 4px;
  }

  .tl-event {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary { background: var(--accent-dark); color: #FFFFFF; }
  .btn-primary:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(58,92,122,0.3);
  }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--accent-dark);
    border: 1px solid var(--accent);
  }
  .btn-secondary:hover { background: var(--card-hover); color: #101820; }

  .progress-bar-wrap {
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .progress-bar { height: 3px; background: rgba(58,92,122,0.12); overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dark), var(--accent-light));
    transition: width 0.5s ease;
  }

  .quiz-grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 28px 32px;
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-dark);
    transition: background 0.3s;
  }

  .question-card:hover { background: var(--card-hover); border-color: var(--border-hover); }
  .question-card.revealed { background: var(--card-revealed); border-color: var(--border-hover); }
  .question-card.revealed::before { background: var(--accent-light); }

  .card-header { display: flex; align-items: flex-start; gap: 20px; }

  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--accent-dark);
    letter-spacing: 2px;
    min-width: 36px;
    padding-top: 2px;
    font-weight: 700;
  }

  .q-text { font-size: 15px; line-height: 1.7; color: #101820; flex: 1; }

  .answer-wrap {
    margin-top: 16px;
    margin-left: 56px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .answer-wrap.show { max-height: 240px; opacity: 1; }

  .answer-box {
    background: var(--answer-bg);
    border-left: 2px solid var(--accent-light);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent-dark);
    font-weight: 700;
    white-space: nowrap;
  }

  .answer-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: #101820;
    font-weight: 700;
  }

  .reveal-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 56px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
  }

  .section-divider span {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--accent-dark);
    letter-spacing: 2px;
    white-space: nowrap;
    font-weight: 700;
  }

  .section-divider::before { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-light)); }
  .section-divider::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent-light), transparent); }

  .score-panel {
    max-width: 900px;
    margin: 48px auto 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .score-text { font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--text-muted); }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--accent-dark);
    line-height: 1;
  }

  .score-number span { font-size: 16px; color: var(--text-muted); font-weight: 400; }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .answer-wrap, .reveal-hint { margin-left: 20px; }
    .tl-item { padding: 0 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">역사 퀴즈 · 남북국 시대의 전개</div>
  <h1>발해를 건국하여<br><span>고구려를 계승하다</span></h1>
  <p class="subtitle">단답형 20문제 · 클릭하여 정답 확인</p>
</div>

<div class="timeline">
  <div class="tl-item"><div class="tl-year">668</div><div class="tl-event">고구려 멸망</div></div>
  <div class="tl-item"><div class="tl-year">696</div><div class="tl-event">거란의 반란</div></div>
  <div class="tl-item"><div class="tl-year">698</div><div class="tl-event">발해 건국</div></div>
  <div class="tl-item"><div class="tl-year">713</div><div class="tl-event">발해 나라 이름 확정</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="revealAll()">전체 정답 보기</button>
  <button class="btn btn-secondary" onclick="hideAll()">전체 정답 숨기기</button>
  <button class="btn btn-secondary" onclick="shuffleCards()">문제 순서 섞기</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 20 확인 완료</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="score-panel">
  <div>
    <div class="score-text">현재 확인한 문제</div>
    <div class="score-number" id="scoreNum">0<span> / 20</span></div>
  </div>
  <button class="btn btn-primary" onclick="revealAll()">모든 정답 확인하기</button>
</div>

<script>
const questions = [

  // ─── 발해의 건국 배경 ───
  { section: "발해의 건국 배경", q: "고구려 멸망 후 당이 고구려 지배층을 비롯한 유민들에게 취한 조치는 무엇인가?", a: "당의 여러 지역으로 이주시킴" },
  { section: "발해의 건국 배경", q: "요서 지방에서 거란인이 반란을 일으키자 당의 통제력이 일시적으로 무너진 이유는 무엇인가?", a: "거란이 반란을 일으켜 당이 이 지역을 통제하지 못하게 됨" },
  { section: "발해의 건국 배경", q: "발해를 건국한 인물은 누구이며, 그의 출신은 무엇인가?", a: "대조영 — 옛 고구려 장수 출신" },
  { section: "발해의 건국 배경", q: "대조영이 이끌고 이동한 두 세력은 무엇인가?", a: "고구려 유민과 말갈인 일부" },
  { section: "발해의 건국 배경", q: "대조영이 추격해 온 당군을 물리친 전투는 무엇인가?", a: "천문령 전투" },
  { section: "발해의 건국 배경", q: "대조영이 발해를 건국한 곳과 연도는 어디인가?", a: "지린성 동모산 근처, 698년" },
  { section: "발해의 건국 배경", q: "발해의 원래 이름은 무엇이며, '발해'라는 나라 이름이 널리 사용되기 시작한 계기는 무엇인가?", a: "원래 이름은 진국 — 713년 당이 대조영을 '발해 군왕'으로 책봉하면서 발해라는 이름이 널리 사용됨" },
  { section: "발해의 건국 배경", q: "발해 건국으로 형성된 한반도의 역사적 형세를 무엇이라 하는가?", a: "남북국 — 남쪽의 신라와 북쪽의 발해가 공존하는 형세" },

  // ─── 발해의 주민 구성 ───
  { section: "발해의 주민 구성", q: "발해 주민의 두 구성 집단을 쓰시오.", a: "고구려 유민과 말갈인" },
  { section: "발해의 주민 구성", q: "발해 380명의 성씨 구성에서 가장 많은 비중을 차지한 성씨와 그 비율은?", a: "그 외(52%) — 대씨(왕족) 31%, 고씨(고구려 왕족) 17%, 이씨·장씨·오씨 등" },
  { section: "발해의 주민 구성", q: "발해의 지배층을 구성한 주요 집단 두 가지를 쓰시오.", a: "고구려 유민(다수), 말갈인 일부" },
  { section: "발해의 주민 구성", q: "발해의 피지배층은 주로 어떤 집단으로 구성되었는가?", a: "고구려 유민과 다수의 말갈인" },

  // ─── 발해의 고구려 계승 의식 ───
  { section: "발해의 고구려 계승 의식", q: "발해의 왕이 일본에 보낸 외교 문서에서 스스로를 어떻게 표현하였는가?", a: "'고려(고구려) 왕' 또는 '고려 국왕'이라고 표현" },
  { section: "발해의 고구려 계승 의식", q: "일본이 발해를 부른 이름은 무엇인가?", a: "고려(고구려)" },
  { section: "발해의 고구려 계승 의식", q: "중국 문서인 『구당서』에서 대조영을 어떻게 기록하고 있는가?", a: "대조영은 본래 고려(고구려)의 별종이다" },
  { section: "발해의 고구려 계승 의식", q: "발해가 고구려를 계승한 나라임을 알 수 있는 근거 두 가지를 쓰시오.", a: "① 발해 왕이 일본 외교 문서에 '고려(고구려) 왕'이라 표현 ② 고구려 유민이 지배층의 중심이 되어 세운 나라" },

  // ─── 남북국 시대 ───
  { section: "남북국 시대", q: "'남북국'이라는 용어를 처음 사용하여 신라와 발해가 모두 우리 민족의 역사임을 강조한 조선 시대 학자는 누구인가?", a: "유득공" },
  { section: "남북국 시대", q: "유득공이 쓴 책의 이름은 무엇인가?", a: "발해고" },
  { section: "남북국 시대", q: "'통일 신라 시대'라는 명칭 대신 '남북국 시대'라는 명칭을 사용하는 이유는 무엇인가?", a: "신라의 삼국 통일만을 강조하지 않고, 신라와 발해의 공존을 함께 강조하기 위해" },
  { section: "남북국 시대", q: "발해 건국의 역사적 의의를 두 가지 쓰시오.", a: "① 고구려를 계승하여 우리 민족의 활동 영역을 북쪽으로 유지 ② 남북국 형세를 이루어 민족사의 외연을 넓힘" },
];

let revealed = new Set();
const TOTAL = questions.length;

function buildCards(list) {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  let currentSection = '';
  list.forEach((item, i) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>◆ ${currentSection}</span>`;
      grid.appendChild(div);
    }
    const card = document.createElement('div');
    card.className = 'question-card' + (revealed.has(item._id) ? ' revealed' : '');
    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer-wrap ${revealed.has(item._id) ? 'show' : ''}" id="ans-${item._id}">
        <div class="answer-box">
          <div class="answer-label">정답</div>
          <div class="answer-text">${item.a}</div>
        </div>
      </div>
      <div class="reveal-hint">↓ 클릭하여 정답 확인</div>
    `;
    card.addEventListener('click', () => toggleCard(item._id, card));
    grid.appendChild(card);
  });
}

function toggleCard(id, card) {
  const ansWrap = document.getElementById('ans-' + id);
  if (revealed.has(id)) {
    revealed.delete(id);
    ansWrap.classList.remove('show');
    card.classList.remove('revealed');
  } else {
    revealed.add(id);
    ansWrap.classList.add('show');
    card.classList.add('revealed');
  }
  updateProgress();
}

function revealAll() {
  questions.forEach(q => revealed.add(q._id));
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.add('revealed'));
  updateProgress();
}

function hideAll() {
  revealed.clear();
  document.querySelectorAll('.answer-wrap').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('revealed'));
  updateProgress();
}

function shuffleCards() {
  hideAll();
  buildCards([...questions].sort(() => Math.random() - 0.5));
}

function updateProgress() {
  const count = revealed.size;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progressText').textContent = `${count} / ${TOTAL} 확인 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('scoreNum').innerHTML = `${count}<span> / ${TOTAL}</span>`;
}

questions.forEach((q, i) => q._id = 'q' + i);
buildCards(questions);
updateProgress();
</script>
</body>
</html>
